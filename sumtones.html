<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>combination tones</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #070709;
      --bg2:     #101012;
      --text:    #d0ccc8;
      --dim:     rgba(208,204,200,0.38);
      --dimmer:  rgba(208,204,200,0.18);
      --border:  rgba(255,255,255,0.07);
      --col-a:   #8ab0c8;
      --col-b:   #a0b888;
      --col-d:   #c8906a;
      --col-s:   #b08acc;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.8rem 1.5rem 4rem;
      gap: 2rem;
    }

    .header { text-align: center; }
    .title {
      font-size: clamp(0.85rem, 2.2vw, 1.1rem);
      font-weight: normal;
      letter-spacing: 0.2em;
      text-transform: lowercase;
    }
    .sub {
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      color: var(--dimmer);
      font-style: italic;
      margin-top: 0.35rem;
      line-height: 1.7;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ── Tone controls ─────────────────────────────── */
    .tone-controls {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .tone-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .tone-label {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      font-style: italic;
      min-width: 3.5rem;
    }
    .tone-label.a { color: var(--col-a); }
    .tone-label.b { color: var(--col-b); }

    .tone-slider {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      min-width: 120px;
      height: 2px;
      background: rgba(255,255,255,0.1);
      border-radius: 1px;
      outline: none;
      cursor: pointer;
    }
    .tone-slider.a::-webkit-slider-thumb { -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%; background: var(--col-a); cursor: pointer; }
    .tone-slider.b::-webkit-slider-thumb { -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%; background: var(--col-b); cursor: pointer; }
    .tone-slider.a::-moz-range-thumb { width: 13px; height: 13px; border-radius: 50%; background: var(--col-a); border: none; cursor: pointer; }
    .tone-slider.b::-moz-range-thumb { width: 13px; height: 13px; border-radius: 50%; background: var(--col-b); border: none; cursor: pointer; }

    .tone-val {
      font-size: 0.8rem;
      min-width: 4.5rem;
      text-align: right;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.04em;
      color: var(--dim);
    }

    .tone-note {
      font-size: 0.62rem;
      min-width: 3.2rem;
      color: var(--dimmer);
      font-style: italic;
      letter-spacing: 0.06em;
    }

    /* ── Quick interval presets ───────────────────── */
    .presets {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .preset-label {
      font-size: 0.55rem;
      letter-spacing: 0.14em;
      color: var(--dimmer);
      font-style: italic;
    }

    .preset-row {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
    }

    .preset-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--dim);
      font-family: Georgia, serif;
      font-size: 0.62rem;
      letter-spacing: 0.07em;
      padding: 0.25rem 0.6rem;
      cursor: pointer;
      transition: color 0.12s, border-color 0.12s;
    }
    .preset-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.22); }

    /* ── Spectrum display ─────────────────────────── */
    .spectrum-wrap {
      width: 100%;
      max-width: 560px;
    }

    .spectrum-wrap canvas {
      display: block;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 2px;
    }

    /* ── Result rows ──────────────────────────────── */
    .results {
      width: 100%;
      max-width: 560px;
      border-top: 1px solid var(--border);
    }

    .result-row {
      display: grid;
      grid-template-columns: 7rem 5.5rem 4rem 1fr 2.5rem;
      gap: 0.6rem;
      align-items: center;
      padding: 0.5rem 0.6rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }
    .result-row:hover { background: rgba(255,255,255,0.025); }
    .result-row.playing { background: rgba(255,255,255,0.04); }

    .r-name {
      font-size: 0.65rem;
      letter-spacing: 0.09em;
      font-style: italic;
    }
    .r-name.a { color: var(--col-a); }
    .r-name.b { color: var(--col-b); }
    .r-name.diff { color: var(--col-d); }
    .r-name.sum  { color: var(--col-s); }

    .r-freq {
      font-size: 0.72rem;
      font-variant-numeric: tabular-nums;
      color: var(--dim);
      text-align: right;
    }
    .r-note {
      font-size: 0.65rem;
      color: var(--dimmer);
      font-style: italic;
    }
    .r-desc {
      font-size: 0.58rem;
      color: rgba(208,204,200,0.22);
      font-style: italic;
      letter-spacing: 0.06em;
    }

    .r-toggle {
      width: 10px; height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.14);
      margin: 0 auto;
      transition: background 0.12s, border-color 0.12s;
    }
    .result-row.playing .r-toggle.a { background: var(--col-a); border-color: var(--col-a); }
    .result-row.playing .r-toggle.b { background: var(--col-b); border-color: var(--col-b); }
    .result-row.playing .r-toggle.diff { background: var(--col-d); border-color: var(--col-d); }
    .result-row.playing .r-toggle.sum  { background: var(--col-s); border-color: var(--col-s); }

    .hint {
      font-size: 0.54rem;
      letter-spacing: 0.12em;
      color: rgba(208,204,200,0.12);
      font-style: italic;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="header">
  <h1 class="title">combination tones</h1>
  <p class="sub">
    two tones produce two more — the difference (B&minus;A) and sum (A+B) ring in the ear<br>
    Tartini discovered these on the violin in 1714
  </p>
</div>

<!-- ── Tone controls ──────────────────────────────────────── -->
<div class="tone-controls">
  <div class="tone-row">
    <span class="tone-label a">tone A</span>
    <input type="range" id="slider-a" class="tone-slider a" min="100" max="1200" step="0.5" value="264">
    <span class="tone-val" id="val-a">264.0 Hz</span>
    <span class="tone-note" id="note-a"></span>
  </div>
  <div class="tone-row">
    <span class="tone-label b">tone B</span>
    <input type="range" id="slider-b" class="tone-slider b" min="100" max="1200" step="0.5" value="330">
    <span class="tone-val" id="val-b">330.0 Hz</span>
    <span class="tone-note" id="note-b"></span>
  </div>
</div>

<!-- ── Presets ────────────────────────────────────────────── -->
<div class="presets">
  <span class="preset-label">quick intervals from C4 (261.63 Hz)</span>
  <div class="preset-row">
    <button class="preset-btn" data-a="261.63" data-b="392.44">P5 (3/2)</button>
    <button class="preset-btn" data-a="261.63" data-b="327.03">M3 (5/4)</button>
    <button class="preset-btn" data-a="261.63" data-b="313.96">m3 (6/5)</button>
    <button class="preset-btn" data-a="261.63" data-b="349.23">P4 (4/3)</button>
    <button class="preset-btn" data-a="261.63" data-b="458.66">7/4</button>
    <button class="preset-btn" data-a="261.63" data-b="366.28">11/8</button>
    <button class="preset-btn" data-a="261.63" data-b="523.25">P8</button>
  </div>
</div>

<!-- ── Spectrum canvas ────────────────────────────────────── -->
<div class="spectrum-wrap">
  <canvas id="spectrum" height="120" aria-label="Frequency spectrum showing tones"></canvas>
</div>

<!-- ── Results ────────────────────────────────────────────── -->
<div class="results" id="results"></div>

<p class="hint">click a row to hear that tone · esc clears all</p>

<script>
const NOTE_NAMES = ['C','C♯','D','E♭','E','F','F♯','G','A♭','A','B♭','B'];

function freqToNote(freq) {
  if (freq <= 0) return '—';
  const midi = 69 + 12 * Math.log2(freq / 440);
  const rnd  = Math.round(midi);
  const name = NOTE_NAMES[((rnd % 12) + 12) % 12];
  const oct  = Math.floor(rnd / 12) - 1;
  const cents = Math.round((midi - rnd) * 100);
  const sign = cents > 0 ? '+' : '';
  return name + oct + (cents !== 0 ? ` ${sign}${cents}¢` : '');
}

function getFA() { return parseFloat(document.getElementById('slider-a').value); }
function getFB() { return parseFloat(document.getElementById('slider-b').value); }

// ── Audio ─────────────────────────────────────────────────
let ac = null;
const voices = {}; // 'a','b','diff','sum' → {osc,gain}
const playing = new Set();

function initAudio() {
  if (ac) return;
  ac = new (window.AudioContext || window.webkitAudioContext)();
}

function toggleVoice(id, freq, col) {
  initAudio();
  if (ac.state === 'suspended') ac.resume();

  if (playing.has(id)) {
    if (voices[id]) {
      voices[id].gain.gain.setTargetAtTime(0, ac.currentTime, 0.05);
      const osc = voices[id].osc;
      setTimeout(() => { try { osc.stop(); } catch(e){} delete voices[id]; }, 400);
    }
    playing.delete(id);
  } else {
    if (freq <= 0) return;
    const osc  = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, ac.currentTime);
    gain.gain.setTargetAtTime(id === 'diff' || id === 'sum' ? 0.06 : 0.10, ac.currentTime, 0.02);
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.start();
    voices[id] = { osc, gain };
    playing.add(id);
  }
  renderResults();
  drawSpectrum();
}

function updateFreq(id, freq) {
  if (voices[id]) voices[id].osc.frequency.setTargetAtTime(freq, ac.currentTime, 0.02);
}

function clearAll() {
  for (const id of [...playing]) {
    if (voices[id]) {
      voices[id].gain.gain.setTargetAtTime(0, ac ? ac.currentTime : 0, 0.05);
      const osc = voices[id].osc;
      setTimeout(() => { try { osc.stop(); } catch(e){} delete voices[id]; }, 300);
    }
    playing.delete(id);
  }
  renderResults();
  drawSpectrum();
}

// ── Compute tones ─────────────────────────────────────────
function computeTones() {
  const fa = getFA();
  const fb = getFB();
  const fd = Math.abs(fb - fa);
  const fs = fa + fb;
  return { a: fa, b: fb, diff: fd, sum: fs };
}

// ── Render results ────────────────────────────────────────
function toneDesc(id, fa, fb) {
  if (id === 'a')    return 'primary tone';
  if (id === 'b')    return 'primary tone';
  if (id === 'diff') {
    const fd = Math.abs(fb - fa);
    return `B − A = ${fd.toFixed(1)} Hz — difference tone (Tartini)`;
  }
  if (id === 'sum')  {
    return `A + B = ${(fa+fb).toFixed(1)} Hz — sum tone`;
  }
}

function renderResults() {
  const { a, b, diff, sum } = computeTones();
  const rows = [
    { id: 'a',    freq: a,    label: 'tone A',       cls: 'a'    },
    { id: 'b',    freq: b,    label: 'tone B',       cls: 'b'    },
    { id: 'diff', freq: diff, label: 'difference',   cls: 'diff' },
    { id: 'sum',  freq: sum,  label: 'sum',          cls: 'sum'  },
  ];

  const el = document.getElementById('results');
  el.innerHTML = '';
  for (const row of rows) {
    const div = document.createElement('div');
    div.className = 'result-row' + (playing.has(row.id) ? ' playing' : '');
    div.innerHTML = `
      <span class="r-name ${row.cls}">${row.label}</span>
      <span class="r-freq">${row.freq.toFixed(1)} Hz</span>
      <span class="r-note">${freqToNote(row.freq)}</span>
      <span class="r-desc">${toneDesc(row.id, a, b)}</span>
      <span class="r-toggle ${row.cls}"></span>
    `;
    div.addEventListener('click', () => toggleVoice(row.id, row.freq,
      row.id === 'a' ? '#8ab0c8' : row.id === 'b' ? '#a0b888' : row.id === 'diff' ? '#c8906a' : '#b08acc'));
    el.appendChild(div);
  }
}

// ── Spectrum ──────────────────────────────────────────────
function drawSpectrum() {
  const cv  = document.getElementById('spectrum');
  const dpr = devicePixelRatio || 1;
  cv.width  = cv.offsetWidth * dpr || 560 * dpr;
  cv.height = 120 * dpr;
  const g = cv.getContext('2d');
  const w = cv.width / dpr, h = cv.height / dpr;
  g.scale(dpr, dpr);

  g.fillStyle = '#090910';
  g.fillRect(0, 0, w, h);

  const { a, b, diff, sum } = computeTones();

  const MAX_FREQ = Math.max(sum * 1.15, 1400);
  const TONES = [
    { freq: a,    col: '#8ab0c8', label: 'A',    amp: 0.80 },
    { freq: b,    col: '#a0b888', label: 'B',    amp: 0.80 },
    { freq: diff, col: '#c8906a', label: 'B−A',  amp: 0.45 },
    { freq: sum,  col: '#b08acc', label: 'A+B',  amp: 0.30 },
  ];

  // Draw frequency axis
  g.strokeStyle = 'rgba(255,255,255,0.06)';
  g.lineWidth = 1;
  g.beginPath();
  g.moveTo(0, h - 14);
  g.lineTo(w, h - 14);
  g.stroke();

  // Tick marks every 200 Hz
  g.font = `italic 7px Georgia, serif`;
  g.fillStyle = 'rgba(208,204,200,0.18)';
  g.textAlign = 'center';
  for (let f = 200; f < MAX_FREQ; f += 200) {
    const x = (f / MAX_FREQ) * w;
    g.fillText(f, x, h - 2);
    g.beginPath();
    g.moveTo(x, h - 14);
    g.lineTo(x, h - 10);
    g.strokeStyle = 'rgba(255,255,255,0.08)';
    g.stroke();
  }

  // Draw vertical lines for each tone
  for (const tone of TONES) {
    if (tone.freq <= 0 || tone.freq > MAX_FREQ * 1.05) continue;
    const x = (tone.freq / MAX_FREQ) * w;
    const isPlaying = playing.has(
      tone.label === 'A' ? 'a' : tone.label === 'B' ? 'b' :
      tone.label === 'B−A' ? 'diff' : 'sum'
    );
    const alpha = isPlaying ? 0.85 : 0.35;

    // Vertical line (spike)
    const spikeH = (h - 22) * tone.amp;
    g.beginPath();
    g.moveTo(x, h - 14);
    g.lineTo(x, h - 14 - spikeH);
    g.strokeStyle = tone.col.replace('#', 'rgba(')
      .replace(/(.{2})(.{2})(.{2})/, (_, r, g2, b) =>
        `rgba(${parseInt(r,16)},${parseInt(g2,16)},${parseInt(b,16)},${alpha})`);
    // Just use a helper
    g.strokeStyle = hexA(tone.col, alpha);
    g.lineWidth = isPlaying ? 2 : 1;
    g.stroke();

    // Label
    g.font = `italic 8px Georgia, serif`;
    g.fillStyle = hexA(tone.col, alpha);
    g.textAlign = 'center';
    g.fillText(tone.label, x, h - 16 - spikeH);

    // Frequency value
    g.font = `7px Georgia, serif`;
    g.fillStyle = hexA(tone.col, alpha * 0.7);
    g.fillText(tone.freq.toFixed(0) + 'Hz', x, h - 7 - spikeH - 8);
  }
}

function hexA(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── Controls ──────────────────────────────────────────────
function updateUI() {
  const fa = getFA(), fb = getFB();
  document.getElementById('val-a').textContent = fa.toFixed(1) + ' Hz';
  document.getElementById('val-b').textContent = fb.toFixed(1) + ' Hz';
  document.getElementById('note-a').textContent = freqToNote(fa);
  document.getElementById('note-b').textContent = freqToNote(fb);

  if (ac && playing.has('a')) updateFreq('a', fa);
  if (ac && playing.has('b')) updateFreq('b', fb);
  if (ac && playing.has('diff')) updateFreq('diff', Math.abs(fb - fa));
  if (ac && playing.has('sum'))  updateFreq('sum',  fa + fb);

  renderResults();
  drawSpectrum();
}

document.getElementById('slider-a').addEventListener('input', updateUI);
document.getElementById('slider-b').addEventListener('input', updateUI);

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.getElementById('slider-a').value = btn.dataset.a;
    document.getElementById('slider-b').value = btn.dataset.b;
    updateUI();
  });
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') clearAll(); });
window.addEventListener('resize', drawSpectrum);

// ── Init ──────────────────────────────────────────────────
updateUI();
</script>
</body>
</html>
