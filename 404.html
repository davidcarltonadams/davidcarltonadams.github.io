<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>— David Carlton Adams</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #060606;
      color: #d4ccC4;
      font-family: Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #score-text {
      max-width: min(640px, 88vw);
      text-align: center;
      padding: 2rem;
    }

    .instruction {
      font-size: clamp(1.1rem, 3.5vw, 1.7rem);
      font-weight: normal;
      line-height: 1.55;
      letter-spacing: 0.02em;
      color: #d4ccc4;
    }

    #back {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      color: rgba(212,204,196,0.12);
      text-decoration: none;
      font-style: italic;
      transition: color 0.2s;
    }
    #back:hover { color: rgba(212,204,196,0.4); }
  </style>
</head>
<body>

<div id="score-text">
  <p class="instruction">this URL doesn't resolve.</p>
</div>

<a id="back" href="index.html">← home</a>

</body>
</html>
