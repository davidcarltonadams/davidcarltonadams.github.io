<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>the harmonic series</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #080808;
      --bg2:     #111010;
      --text:    #d8d0c8;
      --dim:     rgba(216,208,200,0.35);
      --dimmer:  rgba(216,208,200,0.18);
      --accent:  #8ab0c8;
      --on:      #aaccdd;
      --on-bg:   rgba(138,176,200,0.12);
      --border:  rgba(255,255,255,0.07);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem 4rem;
    }

    /* ── Header ───────────────────────────────────── */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .title {
      font-size: clamp(0.85rem, 2.2vw, 1.1rem);
      font-weight: normal;
      letter-spacing: 0.2em;
      text-transform: lowercase;
      color: var(--text);
      margin-bottom: 0.35rem;
    }

    .sub {
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      color: var(--dimmer);
      font-style: italic;
    }

    /* ── Fundamental control ──────────────────────── */
    .control {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .control label {
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      text-transform: lowercase;
      color: var(--dim);
      font-style: italic;
    }

    .freq-input {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text);
      font-family: Georgia, serif;
      font-size: 1.1rem;
      text-align: center;
      width: 5.5rem;
      padding: 0.3rem 0.5rem;
      -moz-appearance: textfield;
    }
    .freq-input::-webkit-inner-spin-button,
    .freq-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .freq-input:focus { outline: none; border-color: var(--accent); }

    .hz-label {
      font-size: 0.7rem;
      color: var(--dim);
      letter-spacing: 0.06em;
    }

    .presets {
      display: flex;
      gap: 0.4rem;
    }

    .preset-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--dim);
      font-family: Georgia, serif;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      padding: 0.25rem 0.55rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .preset-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

    .clear-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--dim);
      font-family: Georgia, serif;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: lowercase;
      padding: 0.25rem 0.6rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .clear-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

    /* ── Partials table ───────────────────────────── */
    .partials {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 0;
      border-top: 1px solid var(--border);
    }

    .partial-row {
      display: grid;
      grid-template-columns: 2rem 1fr 5.5rem 5rem 4.5rem 1.5rem;
      gap: 0.5rem;
      align-items: center;
      padding: 0.55rem 0.75rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.12s;
      user-select: none;
      -webkit-user-select: none;
    }
    .partial-row:hover { background: rgba(255,255,255,0.03); }
    .partial-row.active { background: var(--on-bg); }

    .p-num {
      font-size: 0.62rem;
      color: var(--dimmer);
      letter-spacing: 0.06em;
      text-align: right;
    }
    .partial-row.active .p-num { color: var(--accent); }

    .p-bar-wrap {
      height: 2px;
      background: rgba(255,255,255,0.07);
      border-radius: 1px;
      overflow: hidden;
    }
    .p-bar {
      height: 100%;
      background: rgba(216,208,200,0.2);
      border-radius: 1px;
      transition: background 0.15s;
    }
    .partial-row.active .p-bar { background: var(--on); }

    .p-freq {
      font-size: 0.72rem;
      color: var(--dim);
      text-align: right;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.04em;
    }
    .partial-row.active .p-freq { color: var(--text); }

    .p-note {
      font-size: 0.72rem;
      color: var(--dim);
      text-align: center;
      letter-spacing: 0.06em;
    }
    .partial-row.active .p-note { color: var(--on); }

    .p-cents {
      font-size: 0.65rem;
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-style: italic;
    }

    .p-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: transparent;
      border: 1px solid var(--border);
      margin: 0 auto;
      transition: background 0.12s, border-color 0.12s;
      flex-shrink: 0;
    }
    .partial-row.active .p-dot { background: var(--on); border-color: var(--on); }

    /* Column header */
    .partials-header {
      display: grid;
      grid-template-columns: 2rem 1fr 5.5rem 5rem 4.5rem 1.5rem;
      gap: 0.5rem;
      padding: 0 0.75rem 0.5rem;
      font-size: 0.56rem;
      letter-spacing: 0.12em;
      text-transform: lowercase;
      color: var(--dimmer);
      font-style: italic;
    }

    /* ── Waveform ─────────────────────────────────── */
    .scope-wrap {
      margin-top: 2rem;
      width: 100%;
      max-width: 680px;
    }

    canvas {
      display: block;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 2px;
    }

    /* ── Hint ─────────────────────────────────────── */
    .hint {
      margin-top: 1.5rem;
      font-size: 0.57rem;
      letter-spacing: 0.12em;
      color: var(--dimmer);
      font-style: italic;
    }

    /* ── Responsive ───────────────────────────────── */
    @media (max-width: 480px) {
      .partial-row {
        grid-template-columns: 1.5rem 1fr 4.5rem 4rem 3.5rem 1rem;
        font-size: 0.68rem;
      }
      .partials-header { display: none; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1 class="title">the harmonic series</h1>
  <p class="sub">click a partial to sound it &mdash; layer as many as you like</p>
</div>

<!-- ── Controls ────────────────────────────────────────── -->
<div class="control">
  <label for="fund-input">fundamental</label>
  <input type="number" id="fund-input" class="freq-input"
         value="55" min="20" max="500" step="0.01"
         aria-label="Fundamental frequency in Hz">
  <span class="hz-label">Hz</span>

  <div class="presets" role="group" aria-label="Preset fundamentals">
    <button class="preset-btn" data-f="27.5"  title="A0">A0</button>
    <button class="preset-btn" data-f="55"    title="A1">A1</button>
    <button class="preset-btn" data-f="110"   title="A2">A2</button>
    <button class="preset-btn" data-f="65.41" title="C2">C2</button>
    <button class="preset-btn" data-f="98"    title="G2">G2</button>
  </div>

  <button class="clear-btn" id="clear-btn">clear all</button>
</div>

<!-- ── Partials ─────────────────────────────────────────── -->
<div class="partials-header" aria-hidden="true">
  <span style="text-align:right">n</span>
  <span></span>
  <span style="text-align:right">freq</span>
  <span style="text-align:center">note</span>
  <span style="text-align:right">¢ from 12-TET</span>
  <span></span>
</div>

<div class="partials" id="partials-list" role="list" aria-label="Harmonic partials"></div>

<!-- ── Scope ───────────────────────────────────────────── -->
<div class="scope-wrap">
  <canvas id="scope" height="60" aria-hidden="true"></canvas>
</div>

<p class="hint">click partials above &mdash; change the fundamental to explore different tuning contexts</p>

<script>
// ── Audio engine ─────────────────────────────────────────
let ac = null;
const nodes = {};   // partial index → {osc, gain}
const active = new Set();
let scopeNode = null, analyser = null, scopeBuf = null;
let rafId = null;

function initAudio() {
  if (ac) return;
  ac = new (window.AudioContext || window.webkitAudioContext)();
  analyser = ac.createAnalyser();
  analyser.fftSize = 1024;
  analyser.smoothingTimeConstant = 0.6;
  scopeBuf = new Uint8Array(analyser.fftSize);
  analyser.connect(ac.destination);
}

function getFundamental() {
  const v = parseFloat(document.getElementById('fund-input').value);
  return isFinite(v) && v > 0 ? v : 55;
}

function togglePartial(n) {
  initAudio();
  if (ac.state === 'suspended') ac.resume();

  if (active.has(n)) {
    // fade out and stop
    const {osc, gain} = nodes[n];
    const t = ac.currentTime;
    gain.gain.setTargetAtTime(0, t, 0.04);
    setTimeout(() => { try { osc.stop(); } catch(e){} delete nodes[n]; }, 300);
    active.delete(n);
    if (active.size === 0) stopScope();
  } else {
    const fund = getFundamental();
    const freq = fund * n;
    // amplitude: perceptually compensated rolloff (1/n is physically correct
    // but too steep to hear upper partials — n^0.7 keeps the shape audible)
    const amp = 0.35 / Math.pow(n, 0.7);

    const osc  = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, ac.currentTime);
    gain.gain.setTargetAtTime(amp, ac.currentTime, 0.02);

    osc.connect(gain);
    gain.connect(analyser);
    osc.start();
    nodes[n] = {osc, gain};
    active.add(n);
    startScope();
  }

  updateRows();
}

function clearAll() {
  if (!ac) return;
  const t = ac.currentTime;
  for (const n of [...active]) {
    const {osc, gain} = nodes[n];
    gain.gain.setTargetAtTime(0, t, 0.04);
    setTimeout(() => { try { osc.stop(); } catch(e){} delete nodes[n]; }, 300);
  }
  active.clear();
  stopScope();
  updateRows();
}

// When fundamental changes, retune all active oscillators
function retuneAll() {
  const fund = getFundamental();
  for (const n of active) {
    if (nodes[n]) {
      nodes[n].osc.frequency.setTargetAtTime(fund * n, ac.currentTime, 0.02);
    }
  }
  renderRows(); // update displayed frequencies
}

// ── Note naming ──────────────────────────────────────────
const NOTE_NAMES = ['C','C♯','D','D♯','E','F','F♯','G','G♯','A','A♯','B'];

function freqToNote(freq) {
  if (freq <= 0) return { name: '—', cents: 0 };
  // A4 = 440 Hz, MIDI 69
  const semis = 12 * Math.log2(freq / 440);
  const midi  = Math.round(semis) + 69;
  const cents = Math.round((semis - (midi - 69)) * 100);
  const name  = NOTE_NAMES[((midi % 12) + 12) % 12];
  const oct   = Math.floor(midi / 12) - 1;
  return { name: name + oct, cents };
}

function fmtFreq(f) {
  if (f >= 10000) return (f/1000).toFixed(1) + ' kHz';
  if (f >= 1000)  return (f/1000).toFixed(2) + ' kHz';
  return f.toFixed(1) + ' Hz';
}

function centsColor(c) {
  const abs = Math.abs(c);
  if (abs <= 2)  return 'rgba(170,204,221,0.9)'; // near-pure
  if (abs <= 10) return 'rgba(190,190,160,0.8)';
  if (abs <= 25) return 'rgba(200,170,130,0.75)';
  return 'rgba(200,140,120,0.75)'; // far from 12-TET
}

function centsLabel(c) {
  if (c === 0) return '+0¢';
  return (c > 0 ? '+' : '') + c + '¢';
}

// ── Bar widths ────────────────────────────────────────────
// partial n has width proportional to 1/n (like natural loudness)
function barWidth(n, total) {
  return (1 / n) / (1 / 1) * 100; // relative to fundamental = 100%
}

// ── Render rows ───────────────────────────────────────────
const NUM_PARTIALS = 16;

function renderRows() {
  const fund  = getFundamental();
  const list  = document.getElementById('partials-list');
  list.innerHTML = '';

  for (let n = NUM_PARTIALS; n >= 1; n--) {
    const freq    = fund * n;
    const {name, cents} = freqToNote(freq);
    const isOn    = active.has(n);
    const barPct  = Math.min(100, 100 / n);

    const row = document.createElement('div');
    row.className = 'partial-row' + (isOn ? ' active' : '');
    row.setAttribute('role', 'listitem');
    row.setAttribute('tabindex', '0');
    row.setAttribute('aria-label',
      `Partial ${n}: ${fmtFreq(freq)}, ${name}, ${centsLabel(cents)}`);
    row.setAttribute('aria-pressed', isOn.toString());
    row.dataset.n = n;

    row.innerHTML = `
      <span class="p-num">${n}</span>
      <div class="p-bar-wrap"><div class="p-bar" style="width:${barPct}%"></div></div>
      <span class="p-freq">${fmtFreq(freq)}</span>
      <span class="p-note">${name}</span>
      <span class="p-cents" style="color:${centsColor(cents)}">${centsLabel(cents)}</span>
      <div class="p-dot"></div>
    `;

    row.addEventListener('click',   () => togglePartial(n));
    row.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); togglePartial(n); }
    });

    list.appendChild(row);
  }
}

function updateRows() {
  // Lightweight: just toggle active class without full re-render
  document.querySelectorAll('.partial-row').forEach(row => {
    const n = parseInt(row.dataset.n);
    const isOn = active.has(n);
    row.classList.toggle('active', isOn);
    row.setAttribute('aria-pressed', isOn.toString());
  });
}

// ── Scope ─────────────────────────────────────────────────
function startScope() {
  if (rafId) return;
  drawScope();
}
function stopScope() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  const canvas = document.getElementById('scope');
  const g = canvas.getContext('2d');
  g.clearRect(0, 0, canvas.width, canvas.height);
  g.fillStyle = '#0a0a0a';
  g.fillRect(0, 0, canvas.width, canvas.height);
}

function drawScope() {
  rafId = requestAnimationFrame(drawScope);
  const canvas = document.getElementById('scope');
  const W = canvas.width = canvas.offsetWidth * devicePixelRatio;
  const H = canvas.height = 60 * devicePixelRatio;
  const g = canvas.getContext('2d');
  g.scale(devicePixelRatio, devicePixelRatio);
  const w = W / devicePixelRatio;
  const h = H / devicePixelRatio;

  g.fillStyle = '#0a0a0a';
  g.fillRect(0, 0, w, h);

  if (!analyser) return;
  analyser.getByteTimeDomainData(scopeBuf);

  g.strokeStyle = 'rgba(138,176,200,0.6)';
  g.lineWidth   = 1;
  g.beginPath();
  const sliceW = w / scopeBuf.length;
  for (let i = 0; i < scopeBuf.length; i++) {
    const v  = scopeBuf[i] / 128;
    const y  = h / 2 + (v - 1) * h * 0.42;
    i === 0 ? g.moveTo(0, y) : g.lineTo(i * sliceW, y);
  }
  g.stroke();
}

// ── Events ────────────────────────────────────────────────
document.getElementById('fund-input').addEventListener('input', () => {
  if (active.size > 0) retuneAll();
  else renderRows();
});

document.getElementById('clear-btn').addEventListener('click', clearAll);

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.getElementById('fund-input').value = btn.dataset.f;
    if (active.size > 0) retuneAll();
    else renderRows();
  });
});

// ── Init ──────────────────────────────────────────────────
renderRows();
stopScope();
</script>
</body>
</html>
