<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>a score</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #060606;
      color: #d4ccC4;
      font-family: Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── Score text ─────────────────────────────────────────── */
    #score-text {
      max-width: min(640px, 88vw);
      text-align: center;
      padding: 2rem;
      transition: opacity 0.5s ease;
    }

    .instruction {
      font-size: clamp(1.1rem, 3.5vw, 1.7rem);
      font-weight: normal;
      line-height: 1.55;
      letter-spacing: 0.02em;
      color: #d4ccc4;
    }

    .instruction em {
      font-style: italic;
      color: rgba(212,204,196,0.7);
    }

    /* ── Footer: score id + category ───────────────────────── */
    #score-meta {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      color: rgba(212,204,196,0.18);
      font-style: italic;
      white-space: nowrap;
      text-align: center;
      transition: opacity 0.5s ease;
    }

    /* ── Random button ──────────────────────────────────────── */
    #random-btn {
      position: fixed;
      bottom: 1.6rem;
      right: 2rem;
      font-size: 1rem;
      color: rgba(212,204,196,0.15);
      background: none;
      border: none;
      cursor: pointer;
      font-family: Georgia, serif;
      padding: 0.4rem 0.6rem;
      transition: color 0.3s ease;
      line-height: 1;
    }

    #random-btn:hover { color: rgba(212,204,196,0.45); }

    /* ── Fade state ─────────────────────────────────────────── */
    .fade-out { opacity: 0; }
  </style>
</head>
<body>

<div id="score-text" aria-live="polite">
  <p class="instruction" id="instruction-el"></p>
</div>

<p id="score-meta"></p>
<button id="random-btn" title="random score" aria-label="load random score">↻</button>

<script src="js/scores-data.js"></script>
<script>
const textEl  = document.getElementById('score-text');
const instrEl = document.getElementById('instruction-el');
const metaEl  = document.getElementById('score-meta');
const btn     = document.getElementById('random-btn');

const AUTO_MS = 5 * 60 * 1000; // 5 minutes
let autoTimer = null;
let current   = 0;

function pad(n) { return String(n).padStart(2, '0'); }

function formatText(raw) { return raw.split('\n').join('<br>'); }

function show(idx, animate) {
  const s = SCORES[idx];
  const render = () => {
    instrEl.innerHTML = formatText(s.text);
    metaEl.textContent = pad(s.id) + ' — ' + s.category;
    history.replaceState(null, '', '?n=' + pad(s.id));
    textEl.classList.remove('fade-out');
  };
  if (animate) {
    textEl.classList.add('fade-out');
    setTimeout(render, 500);
  } else {
    render();
  }
}

function randomIndex(avoid) {
  if (SCORES.length === 1) return 0;
  let n;
  do { n = Math.floor(Math.random() * SCORES.length); } while (n === avoid);
  return n;
}

function loadRandom() {
  current = randomIndex(current);
  show(current, true);
  resetTimer();
}

function resetTimer() {
  clearTimeout(autoTimer);
  autoTimer = setTimeout(loadRandom, AUTO_MS);
}

// Click anywhere (except button) or press space/enter/arrow = random
document.addEventListener('click', e => {
  if (e.target !== btn) loadRandom();
});
document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'ArrowRight' || e.key === 'Enter') {
    e.preventDefault();
    loadRandom();
  }
});
btn.addEventListener('click', e => {
  e.stopPropagation();
  loadRandom();
});

// Init: honour ?n= param or pick random
const params = new URLSearchParams(window.location.search);
const nParam = params.get('n');
if (nParam) {
  const id    = parseInt(nParam, 10);
  const found = SCORES.findIndex(s => s.id === id);
  current = found >= 0 ? found : randomIndex(-1);
} else {
  current = randomIndex(-1);
}
show(current, false);
resetTimer();
</script>

</body>
</html>
