<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>spiral of fifths</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #060608;
      --text:    #d0ccc8;
      --dim:     rgba(208,204,200,0.38);
      --dimmer:  rgba(208,204,200,0.18);
      --border:  rgba(255,255,255,0.07);
      --just:    #a0b888;
      --tet12:   #8ab0c8;
      --tet19:   #c8a86a;
      --tet31:   #b08acc;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1rem 4rem;
      gap: 1.4rem;
    }

    .header { text-align: center; }

    .title {
      font-size: clamp(0.85rem, 2.2vw, 1.1rem);
      font-weight: normal;
      letter-spacing: 0.2em;
      text-transform: lowercase;
    }

    .sub {
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      color: var(--dimmer);
      font-style: italic;
      margin-top: 0.35rem;
      line-height: 1.7;
    }

    /* ── Mode buttons ─────────────────────────────── */
    .modes {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .mode-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--dim);
      font-family: Georgia, serif;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      padding: 0.3rem 0.85rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .mode-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .mode-btn.on { color: var(--tet12); border-color: var(--tet12); background: rgba(138,176,200,0.1); }
    .mode-btn[data-m="just"].on  { color: var(--just); border-color: var(--just); background: rgba(160,184,136,0.1); }
    .mode-btn[data-m="12"].on   { color: var(--tet12); border-color: var(--tet12); background: rgba(138,176,200,0.1); }
    .mode-btn[data-m="19"].on   { color: var(--tet19); border-color: var(--tet19); background: rgba(200,168,106,0.1); }
    .mode-btn[data-m="31"].on   { color: var(--tet31); border-color: var(--tet31); background: rgba(176,138,204,0.1); }

    /* ── Canvas ───────────────────────────────────── */
    .canvas-wrap {
      width: 100%;
      max-width: 600px;
      position: relative;
    }

    canvas { display: block; width: 100%; }

    /* ── Info bar ─────────────────────────────────── */
    .info {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: var(--dimmer);
      font-style: italic;
      text-align: center;
      min-height: 1.4rem;
    }

    /* ── Comma info ───────────────────────────────── */
    .comma-info {
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      color: var(--dimmer);
      font-style: italic;
      text-align: center;
      line-height: 1.8;
      max-width: 440px;
    }

    .comma-val {
      font-style: normal;
      color: var(--dim);
    }

    .hint {
      font-size: 0.54rem;
      letter-spacing: 0.12em;
      color: rgba(208,204,200,0.12);
      font-style: italic;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="header">
  <h1 class="title">spiral of fifths</h1>
  <p class="sub">
    each step is a perfect fifth &mdash; does the chain ever close?
  </p>
</div>

<div class="modes" role="group" aria-label="Tuning system">
  <button class="mode-btn" data-m="just">just (3/2)</button>
  <button class="mode-btn on" data-m="12">12-TET</button>
  <button class="mode-btn" data-m="19">19-TET</button>
  <button class="mode-btn" data-m="31">31-TET</button>
</div>

<div class="canvas-wrap">
  <canvas id="spiral" width="600" height="600" aria-label="Spiral of fifths diagram"></canvas>
</div>

<div class="info" id="info">click a node to hear it</div>

<div class="comma-info" id="comma-info"></div>

<p class="hint">esc clears · hover to name · click to hear</p>

<script>
// ── Tuning definitions ────────────────────────────────────
const TUNINGS = {
  just: { label: 'just (3/2)',   fifth: 1200 * Math.log2(3/2), steps: 12, color: '#a0b888', closes: false },
  '12': { label: '12-TET',       fifth: 700,                    steps: 12, color: '#8ab0c8', closes: true  },
  '19': { label: '19-TET',       fifth: 1200 * 11 / 19,        steps: 19, color: '#c8a86a', closes: true  },
  '31': { label: '31-TET',       fifth: 1200 * 18 / 31,        steps: 31, color: '#b08acc', closes: true  },
};

const NOTE_NAMES_SHARP = ['C','C♯','D','D♯','E','F','F♯','G','G♯','A','A♯','B'];
const NOTE_NAMES_FLAT  = ['C','D♭','D','E♭','E','F','G♭','G','A♭','A','B♭','B'];

// Chromatic names for chain-of-fifths order
const CHAIN_NAMES = ['C','G','D','A','E','B','F♯','C♯','G♯','D♯','A♯','E♯',
                     'B♯','F𝄪','C𝄪','G𝄪','D𝄪','A𝄪','E𝄪',
                     'F','C','G','D','A','E','B','F♯','C♯','G♯','D♯','A♯'];
// Simpler: just cycle through these for display
const NAMES_12 = ['C','G','D','A','E','B','F♯','C♯','G♯','E♭','B♭','F'];
const NAMES_19 = ['C','G','D','A','E','B','F♯','C♯','G♯','D♯','A♯','E♯','B♯','G𝄪','D𝄪','A𝄪','E𝄪','B𝄪','F'];
const NAMES_31 = Array.from({length:31}, (_,i) => {
  const base = ['C','G','D','A','E','B','F♯','C♯','G♯','D♯','A♯','E♯',
                'B♯','G𝄪','D𝄪','A𝄪','E𝄪','B𝄪','F𝄫','C𝄫','G𝄫','D𝄫','A𝄫','E𝄫','B𝄫','F','C','G','D','A','E'];
  return base[i] || String(i);
});

// ── Audio ─────────────────────────────────────────────────
let ac = null;
const voices = {};
const activeNodes = new Set();

function initAudio() {
  if (ac) return;
  ac = new (window.AudioContext || window.webkitAudioContext)();
}

const ROOT_FREQ = 261.63; // C4

function pitchForStep(stepIndex, tuningKey) {
  const t = TUNINGS[tuningKey];
  const centsAbove = stepIndex * t.fifth;
  return ROOT_FREQ * Math.pow(2, centsAbove / 1200);
}

function toggleNote(stepIndex, tuningKey) {
  initAudio();
  if (ac.state === 'suspended') ac.resume();
  const key = `${stepIndex}`;
  if (activeNodes.has(stepIndex)) {
    const { osc, gain } = voices[key] || {};
    if (osc) {
      gain.gain.setTargetAtTime(0, ac.currentTime, 0.06);
      setTimeout(() => { try { osc.stop(); } catch(e){} delete voices[key]; }, 400);
    }
    activeNodes.delete(stepIndex);
  } else {
    const freq = pitchForStep(stepIndex, tuningKey);
    const osc  = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, ac.currentTime);
    gain.gain.setTargetAtTime(0.12, ac.currentTime, 0.02);
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.start();
    voices[key] = { osc, gain };
    activeNodes.add(stepIndex);
  }
  draw(currentMode);
}

function clearAll() {
  for (const i of [...activeNodes]) {
    const { osc, gain } = voices[String(i)] || {};
    if (osc) {
      gain.gain.setTargetAtTime(0, ac ? ac.currentTime : 0, 0.05);
      setTimeout(() => { try { osc.stop(); } catch(e){} delete voices[String(i)]; }, 300);
    }
  }
  activeNodes.clear();
  draw(currentMode);
}

// ── Drawing ───────────────────────────────────────────────
let currentMode = '12';
let hoveredStep = -1;

const CANVAS_SIZE = 600;
const CX = CANVAS_SIZE / 2;
const CY = CANVAS_SIZE / 2;

function getNodeNames(mode) {
  if (mode === '12')   return NAMES_12;
  if (mode === '19')   return NAMES_19;
  if (mode === '31')   return NAMES_31;
  return NAMES_12; // just also shows 12 names
}

function draw(mode) {
  const cv = document.getElementById('spiral');
  const dpr = devicePixelRatio || 1;
  cv.width  = CANVAS_SIZE * dpr;
  cv.height = CANVAS_SIZE * dpr;
  cv.style.width  = CANVAS_SIZE + 'px';
  cv.style.height = CANVAS_SIZE + 'px';
  const g = cv.getContext('2d');
  g.scale(dpr, dpr);

  const t = TUNINGS[mode];
  const steps = t.steps;
  const col = t.color;
  const names = getNodeNames(mode);

  g.fillStyle = '#060608';
  g.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

  const INNER_R = 70;
  const OUTER_R = 220;
  const LABEL_R = 250;

  // For just mode, show the spiral: each step adds a tiny outward drift
  // representing the ascending pitch. For TET modes, show a clean circle.
  // The visual metaphor: in just tuning, the 12th node doesn't quite connect
  // back to the first (because of the Pythagorean comma).

  const nodePositions = [];

  for (let i = 0; i < steps; i++) {
    let r, theta;
    const fraction = i / steps;
    const angleDeg = fraction * 360 - 90; // start at top
    theta = angleDeg * Math.PI / 180;

    if (mode === 'just') {
      // Spiral: each step drifts outward by a tiny amount representing
      // the accumulated sharp drift of pure 3/2 vs TET
      const drift = (i * t.fifth) % 1200; // cents above C within one octave
      const driftNorm = drift / 1200;       // 0..1
      // Position on a spiral: angle = position in chain, radius = slightly expanding
      const spiralAngle = (i / 12) * 2 * Math.PI - Math.PI / 2;
      const spiralDrift = i * 1.5; // outward drift per step (visual only)
      r = OUTER_R - 30 + spiralDrift * 1.0;
      // Cap drift and reset radius for legibility
      r = Math.min(r, OUTER_R + 20);
      theta = spiralAngle;
    } else {
      r = OUTER_R;
      theta = (i / steps) * 2 * Math.PI - Math.PI / 2;
    }

    nodePositions.push({ x: CX + r * Math.cos(theta), y: CY + r * Math.sin(theta) });
  }

  // ── Draw connecting lines between consecutive fifths ──
  g.lineWidth = 1;
  for (let i = 0; i < steps; i++) {
    const a = nodePositions[i];
    const b = nodePositions[(i + 1) % steps];
    const isGap = (mode === 'just' && i === steps - 1);
    g.beginPath();
    g.moveTo(a.x, a.y);
    g.lineTo(b.x, b.y);
    if (isGap) {
      g.strokeStyle = 'rgba(220,100,80,0.5)';
      g.lineWidth = 1.5;
      g.setLineDash([4, 4]);
    } else {
      g.strokeStyle = hexToRgba(col, 0.20);
      g.lineWidth = 1;
      g.setLineDash([]);
    }
    g.stroke();
    g.setLineDash([]);
  }

  // ── Draw a subtle circle guide ────────────────────────
  if (mode !== 'just') {
    g.beginPath();
    g.arc(CX, CY, OUTER_R, 0, Math.PI * 2);
    g.strokeStyle = 'rgba(255,255,255,0.04)';
    g.lineWidth = 1;
    g.stroke();
  }

  // ── Draw nodes ────────────────────────────────────────
  const NODE_R = steps > 19 ? 14 : 18;
  const hitTargets = [];

  for (let i = 0; i < steps; i++) {
    const { x, y } = nodePositions[i];
    const isActive  = activeNodes.has(i);
    const isHovered = hoveredStep === i;
    const name = names[i] || String(i);
    const isC = (name === 'C' || name === 'C4');

    // Circle
    g.beginPath();
    g.arc(x, y, NODE_R, 0, Math.PI * 2);
    if (isActive) {
      g.fillStyle = hexToRgba(col, 0.30);
      g.strokeStyle = hexToRgba(col, 0.92);
      g.lineWidth = 2;
    } else if (isHovered) {
      g.fillStyle = hexToRgba(col, 0.12);
      g.strokeStyle = hexToRgba(col, 0.55);
      g.lineWidth = 1.5;
    } else if (isC) {
      g.fillStyle = hexToRgba(col, 0.10);
      g.strokeStyle = hexToRgba(col, 0.40);
      g.lineWidth = 2;
    } else {
      g.fillStyle = 'rgba(255,255,255,0.03)';
      g.strokeStyle = 'rgba(255,255,255,0.14)';
      g.lineWidth = 1;
    }
    g.fill();
    g.stroke();

    // Label
    const fontSize = steps > 19 ? 8 : (name.length > 2 ? 9 : 11);
    g.font = `italic ${fontSize}px Georgia, serif`;
    g.textAlign = 'center';
    g.textBaseline = 'middle';
    g.fillStyle = isActive ? 'rgba(216,208,200,0.96)'
                : isC      ? hexToRgba(col, 0.85)
                           : 'rgba(216,208,200,0.60)';
    g.fillText(name, x, y);

    hitTargets.push({ i, x, y, r: NODE_R + 6 });
  }

  // ── Comma indicator for just mode ─────────────────────
  if (mode === 'just') {
    const first = nodePositions[0];
    const last  = nodePositions[steps - 1];
    const commaX = (last.x + first.x) / 2;
    const commaY = (last.y + first.y) / 2 - 14;
    g.font = 'italic 9px Georgia, serif';
    g.fillStyle = 'rgba(220,100,80,0.65)';
    g.textAlign = 'center';
    g.fillText('← Pythagorean comma', commaX, commaY);
  }

  // Store hit targets for mouse handling
  cv._hitTargets = hitTargets;
  cv._mode = mode;
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── Comma info text ───────────────────────────────────────
function updateCommaInfo(mode) {
  const el = document.getElementById('comma-info');
  const t = TUNINGS[mode];
  const fifth = t.fifth.toFixed(3);
  const commaStr = mode === 'just'
    ? '· after 12 pure fifths, you land 23.46¢ sharp — the <em>Pythagorean comma</em>'
    : '';

  if (mode === 'just') {
    const total = (t.fifth * 12 - 8400).toFixed(2);
    el.innerHTML = `P5 = <span class="comma-val">${fifth}¢</span> &nbsp;&middot;&nbsp; 12 × P5 = <span class="comma-val">${(t.fifth * 12).toFixed(2)}¢</span> &nbsp;&middot;&nbsp; 7 octaves = 8400¢<br><span style="color:rgba(220,100,80,0.7)">gap after 12 fifths: +${total}¢ (Pythagorean comma)</span>`;
  } else if (mode === '12') {
    el.innerHTML = `P5 = <span class="comma-val">${fifth}¢</span> &nbsp;&middot;&nbsp; 12 × P5 = exactly 8400¢ = 7 octaves &nbsp;&middot;&nbsp; <span style="color:${t.color}">circle closes perfectly</span>`;
  } else if (mode === '19') {
    const total = (t.fifth * 19).toFixed(2);
    const octaves = (t.fifth * 19 / 1200).toFixed(4);
    el.innerHTML = `P5 = <span class="comma-val">${fifth}¢</span> &nbsp;&middot;&nbsp; 19 × P5 = <span class="comma-val">${total}¢</span> = exactly 11 octaves &nbsp;&middot;&nbsp; <span style="color:${t.color}">closes at 19 steps</span>`;
  } else if (mode === '31') {
    const total = (t.fifth * 31).toFixed(2);
    el.innerHTML = `P5 = <span class="comma-val">${fifth}¢</span> &nbsp;&middot;&nbsp; 31 × P5 = <span class="comma-val">${total}¢</span> = exactly 18 octaves &nbsp;&middot;&nbsp; <span style="color:${t.color}">closes at 31 steps — meantone fifth (nearly pure M3)</span>`;
  }
}

// ── Interaction ───────────────────────────────────────────
const cv = document.getElementById('spiral');

function hitTest(x, y) {
  if (!cv._hitTargets) return -1;
  for (const h of cv._hitTargets) {
    const dx = x - h.x, dy = y - h.y;
    if (dx*dx + dy*dy <= h.r*h.r) return h.i;
  }
  return -1;
}

function canvasCoords(e) {
  const rect = cv.getBoundingClientRect();
  const scaleX = CANVAS_SIZE / rect.width;
  const scaleY = CANVAS_SIZE / rect.height;
  const touch = e.touches ? e.touches[0] : e;
  return {
    x: (touch.clientX - rect.left) * scaleX,
    y: (touch.clientY - rect.top)  * scaleY,
  };
}

cv.addEventListener('mousemove', e => {
  const { x, y } = canvasCoords(e);
  const hit = hitTest(x, y);
  if (hit !== hoveredStep) {
    hoveredStep = hit;
    draw(currentMode);
    if (hit >= 0) {
      const t = TUNINGS[currentMode];
      const names = getNodeNames(currentMode);
      const cents = (hit * t.fifth) % 1200;
      document.getElementById('info').textContent =
        `${names[hit]} · step ${hit + 1} · ${(hit * t.fifth).toFixed(1)}¢ above C`;
    } else {
      document.getElementById('info').textContent = 'click a node to hear it';
    }
  }
});

cv.addEventListener('mouseleave', () => {
  hoveredStep = -1;
  draw(currentMode);
  document.getElementById('info').textContent = 'click a node to hear it';
});

cv.addEventListener('click', e => {
  const { x, y } = canvasCoords(e);
  const hit = hitTest(x, y);
  if (hit >= 0) toggleNote(hit, currentMode);
});

cv.addEventListener('touchstart', e => {
  e.preventDefault();
  const { x, y } = canvasCoords(e);
  const hit = hitTest(x, y);
  if (hit >= 0) toggleNote(hit, currentMode);
}, { passive: false });

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    clearAll();
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    currentMode = btn.dataset.m;
    draw(currentMode);
    updateCommaInfo(currentMode);
  });
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') clearAll(); });

// ── Init ──────────────────────────────────────────────────
draw(currentMode);
updateCommaInfo(currentMode);
</script>
</body>
</html>
