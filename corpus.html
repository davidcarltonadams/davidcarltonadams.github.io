<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Corpus — David Carlton Adams</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
  :root{
    --bg:#08080c;--s1:#0e0e14;--s2:#12121a;--s3:#181822;
    --brd:#22222e;--brd2:#2e2e3c;
    --tx:#dcdcf0;--txd:#a0a0c4;--txdd:#8888aa;--txddd:#666680;
    --acc:#4a9eff;--accd:#2a5e9f;
    --grn:#2ecc71;--red:#e74c3c;--org:#f39c12;--amber:#d4a843;
    --mono:'JetBrains Mono','SF Mono',monospace;
  }
  html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--mono);overflow:hidden;}

  .wrap{display:flex;flex-direction:column;height:100vh;}

  /* ── Topbar ── */
  .topbar{
    display:flex;align-items:center;gap:0.45rem;
    padding:0.35rem 0.65rem;flex-shrink:0;
    background:var(--s1);border-bottom:1px solid var(--brd);
  }
  .title{font-size:0.6rem;letter-spacing:0.12em;color:var(--txdd);text-transform:uppercase;flex:1;}
  .title span{color:var(--acc);}

  /* ── Controls panel ── */
  .controls{
    display:flex;flex-wrap:wrap;gap:0.5rem;align-items:center;
    padding:0.35rem 0.65rem;flex-shrink:0;
    background:var(--s2);border-bottom:1px solid var(--brd);
  }
  .controls.hidden{display:none;}
  .ctl-grp{display:flex;align-items:center;gap:0.25rem;}
  .ctl-lbl{font-size:0.46rem;color:var(--txdd);letter-spacing:0.08em;text-transform:uppercase;min-width:2.4rem;}
  .ctl-val{font-size:0.5rem;color:var(--txd);min-width:3ch;text-align:right;}
  input[type=range]{
    -webkit-appearance:none;height:2px;background:var(--brd2);outline:none;width:60px;cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;width:10px;height:10px;border-radius:50%;
    background:var(--txdd);cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb:active{background:var(--acc);}
  select{
    background:var(--s2);border:1px solid var(--brd2);border-radius:2px;
    color:var(--txd);font-family:var(--mono);font-size:0.54rem;
    padding:0.1rem 0.2rem;outline:none;
  }

  /* ── Chord bar ── */
  .chord-bar{
    display:flex;gap:0.3rem;align-items:center;
    padding:0.35rem 0.65rem;flex-shrink:0;
    background:var(--s3);border-bottom:1px solid var(--brd);
    overflow-x:auto;-webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .chord-bar::-webkit-scrollbar{display:none;}
  .chord-btn{
    background:var(--s2);border:1px solid var(--brd2);border-radius:3px;
    color:var(--txd);font-family:var(--mono);font-size:0.56rem;letter-spacing:0.03em;
    padding:0.2rem 0.45rem;cursor:pointer;white-space:nowrap;
    transition:all 0.08s;flex-shrink:0;
  }
  .chord-btn:hover{color:var(--tx);border-color:#383848;}
  .chord-btn.active{color:var(--acc);border-color:var(--acc);background:rgba(74,158,255,0.08);}
  .chord-desc{font-size:0.44rem;color:var(--txddd);margin-left:0.2rem;white-space:nowrap;flex-shrink:0;}

  /* ── Pads ── */
  .pads-area{
    flex:1;display:flex;gap:6px;padding:6px;
    min-height:0;
  }
  /* Landscape: side by side */
  @media (orientation:landscape){
    .pads-area{flex-direction:row;}
    #pc1{flex:1.5;}
    #pc2{flex:1;}
  }
  /* Portrait: stacked */
  @media (orientation:portrait){
    .pads-area{flex-direction:column;}
    #pc1,#pc2{flex:1;}
  }
  .pad-container{
    display:flex;flex-direction:column;
    background:var(--s1);border:1px solid var(--brd);border-radius:4px;
    overflow:hidden;min-width:0;min-height:0;
  }
  .pad-canvas{display:block;flex:1;touch-action:none;cursor:crosshair;min-height:0;}
  .pad-label{
    font-size:0.44rem;color:var(--txddd);letter-spacing:0.07em;text-transform:uppercase;
    padding:0.2rem 0.5rem;background:var(--s2);border-top:1px solid var(--brd);
    flex-shrink:0;white-space:nowrap;overflow:hidden;
  }

  /* ── Hint bar ── */
  .hint{
    font-size:0.44rem;color:var(--txddd);letter-spacing:0.06em;
    padding:0.25rem 0.65rem;
    background:var(--s1);border-top:1px solid var(--brd);
    flex-shrink:0;
  }

  /* ── Buttons ── */
  .btn{
    background:var(--s2);border:1px solid var(--brd2);border-radius:3px;
    color:var(--txd);font-family:var(--mono);font-size:0.54rem;letter-spacing:0.04em;
    padding:0.16rem 0.38rem;cursor:pointer;transition:all 0.1s;
  }
  .btn:hover{color:var(--tx);border-color:#383848;}
  .btn.active{color:var(--amber);border-color:var(--amber);}
  .btn.danger{color:var(--red);border-color:var(--red);}
  .sep{width:1px;height:16px;background:var(--brd2);flex-shrink:0;}
</style>
</head>
<body>
<div class="wrap">

  <!-- Topbar -->
  <div class="topbar">
    <span class="title"><span>corpus</span> · dca</span>
    <button class="btn" id="btn-ctrl">ctrl</button>
    <div class="sep"></div>
    <button class="btn" id="btn-pedal">pedal</button>
    <div class="sep"></div>
    <button class="btn" id="btn-mute">mute</button>
    <button class="btn danger" id="btn-panic">panic</button>
  </div>

  <!-- Controls (collapsible) -->
  <div class="controls hidden" id="ctrls">
    <div class="ctl-grp">
      <span class="ctl-lbl">scatter</span>
      <input type="range" id="scatter" min="0" max="60" value="12">
      <span class="ctl-val" id="scatter-val">12¢</span>
    </div>
    <div class="ctl-grp">
      <span class="ctl-lbl">spread</span>
      <input type="range" id="spread" min="0" max="100" value="40">
      <span class="ctl-val" id="spread-val">0.4</span>
    </div>
    <div class="ctl-grp">
      <span class="ctl-lbl">grain</span>
      <input type="range" id="grain-len" min="5" max="200" value="50">
      <span class="ctl-val" id="grain-val">0.5s</span>
    </div>
    <div class="ctl-grp">
      <span class="ctl-lbl">release</span>
      <input type="range" id="rel" min="10" max="200" value="100">
      <span class="ctl-val" id="rel-val">1.0×</span>
    </div>
    <div class="ctl-grp">
      <span class="ctl-lbl">osc</span>
      <select id="osc-type">
        <option value="sawtooth" selected>saw</option>
        <option value="triangle">tri</option>
        <option value="sine">sine</option>
        <option value="square">sqr</option>
      </select>
    </div>
    <div class="ctl-grp">
      <span class="ctl-lbl">rev wet</span>
      <input type="range" id="rev-wet" min="0" max="100" value="20">
      <span class="ctl-val" id="rev-wet-val">20%</span>
    </div>
    <div class="ctl-grp">
      <span class="ctl-lbl">rev dec</span>
      <input type="range" id="rev-dec" min="5" max="50" value="20">
      <span class="ctl-val" id="rev-dec-val">2.0s</span>
    </div>
  </div>

  <!-- Chord selector -->
  <div class="chord-bar" id="chord-bar"></div>

  <!-- XY Pads -->
  <div class="pads-area">
    <div class="pad-container" id="pc1">
      <canvas class="pad-canvas" id="pad1"></canvas>
      <div class="pad-label" id="lbl1">corpus &nbsp;·&nbsp; x: density &nbsp;·&nbsp; y: tessitura</div>
    </div>
    <div class="pad-container" id="pc2">
      <canvas class="pad-canvas" id="pad2"></canvas>
      <div class="pad-label">mix &nbsp;·&nbsp; x: lpf cutoff &nbsp;·&nbsp; y: volume</div>
    </div>
  </div>

  <!-- Hint -->
  <div class="hint">hold corpus pad to play · release to stop · pedal = always on · select chord · set mix</div>

</div>
<script>
(function(){'use strict';

// ═══════════════════════════════════════════════════════
// BLOCK 1: CHORD DEFINITIONS
// All pitches: cents from C (pitch classes 0–1199).
// Tones: [cents, weight] — weight 1.0 = always, 0.3 = occasional extension.
// Root used for display only.
// ═══════════════════════════════════════════════════════
const CHORDS = [
  {
    id:'C~', label:'C~', desc:'pan-hybrid',
    tones:[[0,1.0],[200,0.6],[393,0.8],[550,0.7],[700,1.0],[845,0.5],[1088,0.6]],
    ext:  [[970,0.3],[50,0.25]]
  },
  {
    id:'Cqts_m', label:'C↑m', desc:'C quarter-sharp minor',
    tones:[[50,1.0],[366,0.8],[752,0.9]],
    ext:  []
  },
  {
    id:'Cs_m', label:'C#m', desc:'C# minor',
    tones:[[100,1.0],[400,0.8],[800,0.9]],
    ext:  []
  },
  {
    id:'Dm', label:'Dm', desc:'D minor / neutral 3rd',
    tones:[[200,1.0],[550,0.8],[900,0.9]],
    ext:  [[500,0.35]]
  },
  {
    id:'Em', label:'Em', desc:'E minor + Fqts b9',
    tones:[[400,1.0],[700,0.9],[1100,0.8]],
    ext:  [[550,0.4]]
  },
  {
    id:'F', label:'F', desc:'F major',
    tones:[[500,1.0],[900,0.8],[0,0.9]],
    ext:  []
  },
  {
    id:'Fqts_m', label:'F↑m', desc:'F quarter-sharp minor',
    tones:[[550,1.0],[866,0.8],[52,0.9]],
    ext:  []
  },
  {
    id:'G', label:'G', desc:'G major (ET)',
    tones:[[700,1.0],[1100,0.8],[200,0.9]],
    ext:  []
  },
  {
    id:'Gm_lo', label:'Gm↓', desc:'G min · Bb−9.7¢',
    tones:[[700,1.0],[990.3,0.85],[200,0.9]],   // G, Bb−9.7¢, D
    ext:  [[495.3,0.4]]                          // F−4.7¢
  },
  {
    id:'Am', label:'Am', desc:'A minor',
    tones:[[900,1.0],[0,0.8],[400,0.9]],
    ext:  [[1050,0.3],[550,0.3]]
  },
  {
    id:'Bb', label:'B♭', desc:'Bb major',
    tones:[[1000,1.0],[200,0.8],[500,0.9]],
    ext:  []
  },
  {
    id:'Bm', label:'Bm', desc:'B minor',
    tones:[[1100,1.0],[200,0.8],[600,0.9]],
    ext:  []
  },
];

// ═══════════════════════════════════════════════════════
// BLOCK 2: STATE
// ═══════════════════════════════════════════════════════
const state = {
  chordIdx: 0,
  xy1: {x:0.35, y:0.5},   // corpus: x=density, y=tessitura
  xy2: {x:0.75, y:0.65},  // mix:    x=lpf,     y=volume
  scatter:  12,            // cents of pitch scatter per grain
  spread:   0.4,           // octave scatter width (0=none, 1=±2 octaves)
  grainLen: 0.5,           // grain duration in seconds
  relMult:  1.0,           // grain release multiplier
  oscType: 'sawtooth',
  muted: false,
  pedalMode: false,
  reverbWet: 0.20,         // 0–1
  reverbDecay: 2.0,        // seconds
};

// ═══════════════════════════════════════════════════════
// BLOCK 3: AUDIO ENGINE
// Chain: grains → masterGain → lpfNode → shaperNode → dryGain → limiter → out
//                                                    ↘ reverbConv → wetGain → limiter → out
// ═══════════════════════════════════════════════════════
let ctx = null;
let masterGain = null;
let lpfNode = null;
let shaperNode = null;
let reverbConv = null;
let wetGain = null;
let dryGain = null;
let limiter = null;
let audioReady = false;

function makeShaperCurve(amt){
  const n=256, c=new Float32Array(n);
  for(let i=0;i<n;i++){const x=(i*2)/n-1; c[i]=((Math.PI+amt)*x)/(Math.PI+amt*Math.abs(x));}
  return c;
}

function makeReverbIR(actx, decaySec){
  const sr  = actx.sampleRate;
  const len = Math.ceil(sr * decaySec);
  const ir  = actx.createBuffer(2, len, sr);
  for(let c=0;c<2;c++){
    const d = ir.getChannelData(c);
    for(let i=0;i<len;i++){
      d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 2.0);
    }
  }
  return ir;
}

function initAudio(){
  if(ctx) return;
  ctx = new (window.AudioContext||window.webkitAudioContext)();

  masterGain = ctx.createGain();
  masterGain.gain.value = applyVolCurve(state.xy2.y);

  lpfNode = ctx.createBiquadFilter();
  lpfNode.type = 'lowpass';
  lpfNode.frequency.value = applyLPFCurve(state.xy2.x);
  lpfNode.Q.value = 0.5;

  shaperNode = ctx.createWaveShaper();
  shaperNode.curve = makeShaperCurve(25);
  shaperNode.oversample = '2x';

  reverbConv = ctx.createConvolver();
  reverbConv.buffer = makeReverbIR(ctx, state.reverbDecay);

  wetGain = ctx.createGain();
  wetGain.gain.value = state.reverbWet;

  dryGain = ctx.createGain();
  dryGain.gain.value = 1.0;

  limiter = ctx.createGain();
  limiter.gain.value = 0.72;

  // Wire chain
  masterGain.connect(lpfNode);
  lpfNode.connect(shaperNode);
  shaperNode.connect(dryGain);
  shaperNode.connect(reverbConv);
  reverbConv.connect(wetGain);
  dryGain.connect(limiter);
  wetGain.connect(limiter);
  limiter.connect(ctx.destination);

  // iOS AudioContext unlock
  const buf = ctx.createBuffer(1,1,ctx.sampleRate);
  const s = ctx.createBufferSource(); s.buffer=buf;
  s.connect(ctx.destination); s.start(0);

  audioReady = true;
}

function ensureAudio(){
  if(!ctx) initAudio();
  if(ctx && ctx.state==='suspended') ctx.resume();
}

// ── Curves ──
function applyVolCurve(y){ return Math.pow(clamp(y,0,1), 1.8); }
function applyLPFCurve(x){
  // x=0 → 200 Hz (dark/closed), x=1 → 8000 Hz (bright/open)
  return 200 * Math.pow(8000/200, clamp(x,0,1));
}

function applyMixState(){
  if(!audioReady) return;
  const vol = state.muted ? 0 : applyVolCurve(state.xy2.y);
  masterGain.gain.setTargetAtTime(vol, ctx.currentTime, 0.04);
  lpfNode.frequency.setTargetAtTime(applyLPFCurve(state.xy2.x), ctx.currentTime, 0.04);
}

function updateReverbWet(){
  if(!audioReady) return;
  wetGain.gain.setTargetAtTime(state.reverbWet, ctx.currentTime, 0.05);
}

function updateReverbDecay(){
  if(!audioReady || !reverbConv) return;
  reverbConv.buffer = makeReverbIR(ctx, state.reverbDecay);
}

// ═══════════════════════════════════════════════════════
// BLOCK 4: GRAIN ENGINE
// ═══════════════════════════════════════════════════════
const BASE_HZ = 261.63; // C4

function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function lerp(a,b,t){return a+(b-a)*clamp(t,0,1);}
function centsToHz(c){return BASE_HZ*Math.pow(2,c/1200);}

function weightedPick(arr){
  let tot=0; for(const [,w] of arr) tot+=w;
  let r=Math.random()*tot;
  for(const [v,w] of arr){r-=w; if(r<=0) return v;}
  return arr[arr.length-1][0];
}

// Grain visual particles
const particles = [];

function triggerGrain(){
  if(!audioReady || !ctx) return;
  const chord   = CHORDS[state.chordIdx];
  const density = state.xy1.x;        // grain rate + amp
  const tess    = state.xy1.y;        // register height (0=low, 1=high)

  // Pitch: pick class, add tessitura center + random octave scatter
  const pool = [...chord.tones, ...chord.ext];
  const pc   = weightedPick(pool);
  // tessitura: y=0 → −2 oct (C2), y=0.5 → −0.5 oct, y=1 → +1 oct (C5)
  const tessCenter   = lerp(-2400, 1200, tess);
  const spreadRange  = state.spread * 2400;
  const octOff       = tessCenter + (Math.random()-0.5)*2 * spreadRange;
  const scatterCents = (Math.random()-0.5)*2 * state.scatter;
  const finalCents   = pc + octOff + scatterCents;
  const freq = centsToHz(finalCents);

  // Grain timing — duration from grainLen dial
  const dur    = state.grainLen;
  const attack = Math.min(0.09, dur * 0.12);
  const rel    = dur * 0.45 * state.relMult;
  const amp    = lerp(0.20, 0.055, density) * (0.55 + Math.random()*0.45);

  // Build nodes
  const now    = ctx.currentTime;
  const osc    = ctx.createOscillator();
  const gEnv   = ctx.createGain();
  const grainF = ctx.createBiquadFilter();

  osc.type = state.oscType;
  osc.frequency.value = freq;

  // Per-grain LPF: varies with density
  grainF.type = 'lowpass';
  grainF.frequency.value = lerp(380, 3200, density) * (0.6+Math.random()*0.8);
  grainF.Q.value = 0.4 + Math.random()*0.8;

  // Stereo pan — spread controls width
  let pan;
  try{
    pan = ctx.createStereoPanner();
    pan.pan.value = (Math.random()-0.5)*2*lerp(0.3,1.0,state.spread);
  } catch(e){
    pan = ctx.createGain(); pan.pan={value:0};
  }

  // Envelope
  gEnv.gain.setValueAtTime(0.0001, now);
  gEnv.gain.linearRampToValueAtTime(amp, now+attack);
  gEnv.gain.setValueAtTime(amp, now+dur-rel);
  gEnv.gain.exponentialRampToValueAtTime(0.0001, now+dur);

  // Connect
  osc.connect(grainF);
  grainF.connect(gEnv);
  gEnv.connect(pan);
  pan.connect(masterGain);

  osc.start(now);
  osc.stop(now+dur+0.05);
  osc.onended = ()=>{
    try{osc.disconnect();grainF.disconnect();gEnv.disconnect();pan.disconnect();}catch(e){}
  };

  // Visual particle — scatter around tessitura/density position
  const jx = state.xy1.x + (Math.random()-0.5)*0.35;
  const jy = state.xy1.y + (Math.random()-0.5)*0.35;
  particles.push({
    x: clamp(jx,0,1),
    y: clamp(jy,0,1),
    life: 1.0,
    decay: 1/(dur * 60 * lerp(0.7,1.4,density)),
    size: lerp(11,4,density),
    hue: 210 + Math.round(pc/1200*60),
  });
}

// ── Scheduler ──
let grainTimer = null;
let engineOn   = false;

function scheduleGrain(){
  if(!engineOn) return;
  triggerGrain();
  const rate     = lerp(0.35, 9.5, state.xy1.x);   // density on x
  const interval = (1000/rate) * (0.65+Math.random()*0.7);
  grainTimer = setTimeout(scheduleGrain, interval);
}

function startEngine(){
  if(engineOn) return;
  engineOn = true;
  scheduleGrain();
}

function stopEngine(){
  engineOn = false;
  if(grainTimer){clearTimeout(grainTimer);grainTimer=null;}
}

function panicAll(){
  stopEngine();
  particles.length = 0;
  if(!ctx) return;
  try{masterGain.disconnect();}catch(e){}
  try{lpfNode.disconnect();}catch(e){}
  try{shaperNode.disconnect();}catch(e){}
  try{reverbConv.disconnect();}catch(e){}
  try{wetGain.disconnect();}catch(e){}
  try{dryGain.disconnect();}catch(e){}
  try{limiter.disconnect();}catch(e){}

  masterGain = ctx.createGain();
  masterGain.gain.value = state.muted ? 0 : applyVolCurve(state.xy2.y);

  lpfNode = ctx.createBiquadFilter();
  lpfNode.type = 'lowpass';
  lpfNode.frequency.value = applyLPFCurve(state.xy2.x);
  lpfNode.Q.value = 0.5;

  shaperNode = ctx.createWaveShaper();
  shaperNode.curve = makeShaperCurve(25);
  shaperNode.oversample = '2x';

  reverbConv = ctx.createConvolver();
  reverbConv.buffer = makeReverbIR(ctx, state.reverbDecay);

  wetGain = ctx.createGain();
  wetGain.gain.value = state.reverbWet;
  dryGain = ctx.createGain();
  dryGain.gain.value = 1.0;

  limiter = ctx.createGain();
  limiter.gain.value = 0.72;

  masterGain.connect(lpfNode);
  lpfNode.connect(shaperNode);
  shaperNode.connect(dryGain);
  shaperNode.connect(reverbConv);
  reverbConv.connect(wetGain);
  dryGain.connect(limiter);
  wetGain.connect(limiter);
  limiter.connect(ctx.destination);
}

// ═══════════════════════════════════════════════════════
// BLOCK 5: CANVAS PAD DRAWING
// ═══════════════════════════════════════════════════════
const pad1 = document.getElementById('pad1');
const pad2 = document.getElementById('pad2');

function resizePads(){
  const pc1=document.getElementById('pc1');
  const pc2=document.getElementById('pc2');
  const l1=pc1.querySelector('.pad-label');
  const l2=pc2.querySelector('.pad-label');
  pad1.width  = pc1.clientWidth;
  pad1.height = Math.max(60, pc1.clientHeight - l1.offsetHeight);
  pad2.width  = pc2.clientWidth;
  pad2.height = Math.max(60, pc2.clientHeight - l2.offsetHeight);
}

const C = {
  bg:'#08080c',s1:'#0e0e14',brd:'#22222e',brd2:'#2e2e3c',
  tx:'#dcdcf0',txd:'#a0a0c4',txdd:'#8888aa',txddd:'#666680',
  acc:'#4a9eff',grn:'#2ecc71',amber:'#d4a843',red:'#e74c3c',
};

function drawGrid(g, W, H){
  g.strokeStyle = C.brd;
  g.lineWidth   = 0.5;
  for(let i=1;i<4;i++){
    g.beginPath();g.moveTo(W*i/4,0);g.lineTo(W*i/4,H);g.stroke();
    g.beginPath();g.moveTo(0,H*i/4);g.lineTo(W,H*i/4);g.stroke();
  }
}

function drawCursor(g, x, y, W, H, color){
  const cx = x*W, cy = (1-y)*H;
  g.globalAlpha = 0.55;
  g.strokeStyle = color; g.lineWidth = 1.0;
  g.beginPath();g.moveTo(cx,0);g.lineTo(cx,H);g.stroke();
  g.beginPath();g.moveTo(0,cy);g.lineTo(W,cy);g.stroke();
  g.globalAlpha = 1;
  g.beginPath();g.arc(cx,cy,6,0,Math.PI*2);
  g.fillStyle = color; g.fill();
}

function drawPad1(){
  const g=pad1.getContext('2d');
  const W=pad1.width, H=pad1.height;
  if(!W||!H) return;

  g.fillStyle = C.s1; g.fillRect(0,0,W,H);
  drawGrid(g,W,H);

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    const px=p.x*W, py=(1-p.y)*H;
    const a=Math.pow(p.life,1.5);
    g.beginPath();
    g.arc(px,py,p.size*p.life+1,0,Math.PI*2);
    g.fillStyle=`hsla(${p.hue},85%,65%,${a*0.55})`;
    g.fill();
    p.life -= p.decay;
    if(p.life<=0) particles.splice(i,1);
  }

  // Axis labels
  g.font=`10px JetBrains Mono,monospace`;
  g.fillStyle=C.txddd;
  g.fillText('sparse', 5, H-5);
  g.fillText('dense',  W-36, H-5);
  g.fillText('high',   5, 13);
  g.fillText('low',    5, H-16);

  // Chord name
  const chord = CHORDS[state.chordIdx];
  g.fillStyle  = C.txd;
  g.font       = `bold 13px JetBrains Mono,monospace`;
  g.textAlign  = 'center';
  g.fillColor  = C.txd;

  // Engine indicator
  if(engineOn){
    g.fillStyle = C.grn;
    g.font = `bold 13px JetBrains Mono,monospace`;
  } else {
    g.fillStyle = C.txd;
    g.font = `bold 13px JetBrains Mono,monospace`;
  }
  g.fillText(chord.label, W/2, 16);
  g.font       = `10px JetBrains Mono,monospace`;
  g.fillStyle  = C.txddd;
  g.fillText(chord.desc, W/2, 30);
  g.textAlign  = 'left';

  // Readouts
  const d = Math.round(state.xy1.x*100);
  const t = Math.round(state.xy1.y*100);
  g.fillStyle = C.txdd; g.font=`9px JetBrains Mono,monospace`;
  g.textAlign = 'right';
  g.fillText(`den ${d}%  tess ${t}%`, W-5, H-5);
  g.textAlign = 'left';

  // Pedal mode indicator
  if(state.pedalMode){
    g.fillStyle = C.amber;
    g.font = `9px JetBrains Mono,monospace`;
    g.fillText('pedal', 5, 28);
  }

  drawCursor(g, state.xy1.x, state.xy1.y, W, H, engineOn ? C.grn : C.acc);
}

function drawPad2(){
  const g=pad2.getContext('2d');
  const W=pad2.width, H=pad2.height;
  if(!W||!H) return;

  g.fillStyle = C.s1; g.fillRect(0,0,W,H);
  drawGrid(g,W,H);

  // Volume fill
  const volY = (1-state.xy2.y)*H;
  if(!state.muted && state.xy2.y>0.01){
    const grad=g.createLinearGradient(0,H,0,volY);
    grad.addColorStop(0,'rgba(212,168,67,0.0)');
    grad.addColorStop(1,'rgba(212,168,67,0.12)');
    g.fillStyle=grad;
    g.fillRect(0,volY,W,H-volY);
  }

  // LPF fill — horizontal gradient showing filter openness
  if(state.xy2.x>0.02){
    const grad2=g.createLinearGradient(0,0,state.xy2.x*W,0);
    grad2.addColorStop(0,'rgba(46,204,113,0.0)');
    grad2.addColorStop(1,'rgba(46,204,113,0.12)');
    g.fillStyle=grad2;
    g.fillRect(0,0,state.xy2.x*W,H);
  }

  // Axis labels
  g.font=`10px JetBrains Mono,monospace`;
  g.fillStyle=C.txddd;
  g.fillText('dark',   5, H-5);
  g.fillText('bright', W-38, H-5);
  g.fillText('loud',   5, 13);
  g.fillText('quiet',  5, H-16);

  // Readouts
  const volPct = state.muted ? 'MUTE' : Math.round(applyVolCurve(state.xy2.y)*100)+'%';
  const lpfHz  = Math.round(applyLPFCurve(state.xy2.x));
  const lpfStr = lpfHz<1000 ? lpfHz+'Hz' : (lpfHz/1000).toFixed(1)+'k';
  g.textAlign = 'right';
  g.fillStyle = state.muted ? C.red : C.txdd;
  g.fillText(`vol ${volPct}`, W-5, 13);
  g.fillStyle = C.txdd;
  g.fillText(`lpf ${lpfStr}`, W-5, 26);
  g.textAlign = 'left';

  drawCursor(g, state.xy2.x, state.xy2.y, W, H,
             state.muted ? C.red : C.amber);
}

// ── Animation loop ──
function animate(){
  drawPad1();
  drawPad2();
  requestAnimationFrame(animate);
}

// ═══════════════════════════════════════════════════════
// BLOCK 6: PAD INTERACTION
// ═══════════════════════════════════════════════════════
function getPadXY(e, canvas){
  const rect  = canvas.getBoundingClientRect();
  const src   = e.touches ? e.touches[0] : e;
  const x = clamp((src.clientX - rect.left)  / rect.width,  0, 1);
  const y = clamp(1 - (src.clientY - rect.top) / rect.height, 0, 1);
  return {x, y};
}

function setupPad(canvas, xyKey, onDown, onMove, onUp){
  let active = false;

  function down(e){
    e.preventDefault();
    ensureAudio();
    active = true;
    canvas.setPointerCapture && canvas.setPointerCapture(e.pointerId);
    const xy = getPadXY(e, canvas);
    state[xyKey] = xy;
    if(onDown) onDown(xy);
    onMove(xy);
  }
  function move(e){
    e.preventDefault();
    if(!active) return;
    const xy = getPadXY(e, canvas);
    state[xyKey] = xy;
    onMove(xy);
  }
  function up(){
    if(!active) return;
    active = false;
    if(onUp) onUp();
  }

  canvas.addEventListener('pointerdown',   down,  {passive:false});
  canvas.addEventListener('pointermove',   move,  {passive:false});
  canvas.addEventListener('pointerup',     up);
  canvas.addEventListener('pointercancel', up);
  canvas.addEventListener('touchstart', e=>{e.preventDefault();ensureAudio();},{passive:false});
}

// Pad 1: touch = play, release = stop (unless pedal mode)
setupPad(pad1, 'xy1',
  ()=>{ startEngine(); },          // down → start
  ()=>{ /* grain reads state */ },  // move
  ()=>{ if(!state.pedalMode) stopEngine(); }  // up → stop unless pedal
);

// Pad 2: mix control only
setupPad(pad2, 'xy2',
  null,
  ()=>{ applyMixState(); },
  null
);

// ═══════════════════════════════════════════════════════
// BLOCK 7: CHORD SELECTION
// ═══════════════════════════════════════════════════════
function buildChordBar(){
  const bar = document.getElementById('chord-bar');
  CHORDS.forEach((ch, i)=>{
    const btn = document.createElement('button');
    btn.className = 'chord-btn' + (i===0 ? ' active' : '');
    btn.textContent = ch.label;
    btn.title = ch.desc;
    btn.addEventListener('click', ()=>{
      ensureAudio();
      state.chordIdx = i;
      bar.querySelectorAll('.chord-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
    });
    bar.appendChild(btn);
  });
  const desc = document.createElement('span');
  desc.className = 'chord-desc';
  desc.id = 'chord-desc';
  desc.textContent = CHORDS[0].desc;
  bar.appendChild(desc);
}

// ═══════════════════════════════════════════════════════
// BLOCK 8: CONTROLS WIRING
// ═══════════════════════════════════════════════════════
function initControls(){
  // Scatter
  const scEl=document.getElementById('scatter');
  const scVl=document.getElementById('scatter-val');
  scEl.addEventListener('input',()=>{
    state.scatter=+scEl.value;
    scVl.textContent=scEl.value+'¢';
  });

  // Spread
  const spEl=document.getElementById('spread');
  const spVl=document.getElementById('spread-val');
  spEl.addEventListener('input',()=>{
    state.spread=+spEl.value/100;
    spVl.textContent=(+spEl.value/100).toFixed(2);
  });

  // Grain length
  const glEl=document.getElementById('grain-len');
  const glVl=document.getElementById('grain-val');
  glEl.addEventListener('input',()=>{
    state.grainLen=+glEl.value/100;
    glVl.textContent=(+glEl.value/100).toFixed(2)+'s';
  });

  // Release multiplier
  const relEl=document.getElementById('rel');
  const relVl=document.getElementById('rel-val');
  relEl.addEventListener('input',()=>{
    state.relMult=+relEl.value/100;
    relVl.textContent=(+relEl.value/100).toFixed(1)+'×';
  });

  // Osc type
  document.getElementById('osc-type').addEventListener('change', e=>{
    state.oscType=e.target.value;
  });

  // Reverb wet
  const rwEl=document.getElementById('rev-wet');
  const rwVl=document.getElementById('rev-wet-val');
  rwEl.addEventListener('input',()=>{
    state.reverbWet=+rwEl.value/100;
    rwVl.textContent=rwEl.value+'%';
    updateReverbWet();
  });

  // Reverb decay
  const rdEl=document.getElementById('rev-dec');
  const rdVl=document.getElementById('rev-dec-val');
  rdEl.addEventListener('input',()=>{
    state.reverbDecay=+rdEl.value/10;
    rdVl.textContent=(+rdEl.value/10).toFixed(1)+'s';
    updateReverbDecay();
  });

  // Controls toggle
  document.getElementById('btn-ctrl').addEventListener('click',()=>{
    document.getElementById('ctrls').classList.toggle('hidden');
  });

  // Pedal mode
  const pedalBtn = document.getElementById('btn-pedal');
  pedalBtn.addEventListener('click',()=>{
    ensureAudio();
    state.pedalMode = !state.pedalMode;
    pedalBtn.classList.toggle('active', state.pedalMode);
    // If turning pedal off while engine is on and no finger down → stop
    // (can't detect finger state here, so just leave running; next touch-up will stop)
  });

  // Mute
  const muteBtn = document.getElementById('btn-mute');
  muteBtn.addEventListener('click',()=>{
    ensureAudio();
    state.muted = !state.muted;
    muteBtn.classList.toggle('active', state.muted);
    applyMixState();
  });

  // Panic
  document.getElementById('btn-panic').addEventListener('click',()=>{
    ensureAudio();
    panicAll();
  });

  // Global unlock
  document.addEventListener('mousedown',  ensureAudio, {once:true});
  document.addEventListener('touchstart', ensureAudio, {once:true,passive:true});
  document.addEventListener('click',      ensureAudio, {once:true});
}

// ═══════════════════════════════════════════════════════
// BLOCK 9: RESIZE + ORIENTATION
// ═══════════════════════════════════════════════════════
function doResize(){
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    resizePads();
  }));
}

window.addEventListener('resize', doResize);
window.addEventListener('orientationchange', ()=>{
  panicAll();
  doResize();
});

// ═══════════════════════════════════════════════════════
// BLOCK 10: INIT
// ═══════════════════════════════════════════════════════
function init(){
  buildChordBar();
  initControls();
  doResize();
  animate();
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

})();
</script>
</body>
</html>
