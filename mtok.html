<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MTOK — David Carlton Adams</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --bg:#08080c;--s1:#0e0e14;--s2:#12121a;--s3:#181822;
    --brd:#22222e;--brd2:#2e2e3c;
    --tx:#dcdcf0;--txd:#a0a0c4;--txdd:#8888aa;--txddd:#666680;
    --acc:#4a9eff;--accd:#2a5e9f;
    --grn:#2ecc71;--red:#e74c3c;--org:#f39c12;--amber:#d4a843;
    --mono:'JetBrains Mono','SF Mono',monospace;
  }
  html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--mono);overflow:hidden;}

  /* ── Layout ── */
  .wrap{display:flex;flex-direction:column;height:100vh;}
  .topbar{
    display:flex;flex-wrap:wrap;gap:0.45rem;align-items:center;
    padding:0.45rem 0.65rem;
    background:var(--s1);border-bottom:1px solid var(--brd);
    flex-shrink:0;
  }
  .controls{
    display:flex;flex-wrap:wrap;gap:0.5rem;align-items:center;
    padding:0.4rem 0.65rem;
    background:var(--s2);border-bottom:1px solid var(--brd);
    flex-shrink:0;
  }
  .controls.hidden{display:none;}
  .keyboard-wrap{
    flex:1;overflow-x:auto;overflow-y:hidden;
    -webkit-overflow-scrolling:touch;
    background:var(--bg);
  }
  #kb-canvas{display:block;touch-action:none;cursor:pointer;}
  .hint-bar{
    font-size:0.5rem;color:var(--txddd);letter-spacing:0.06em;
    padding:0.3rem 0.65rem;
    background:var(--s1);border-top:1px solid var(--brd);
    flex-shrink:0;
  }

  /* ── Topbar elements ── */
  .tb-sep{width:1px;height:16px;background:var(--brd2);flex-shrink:0;}
  .tb-grp{display:flex;align-items:center;gap:0.3rem;}
  .lbl{font-size:0.5rem;color:var(--txdd);letter-spacing:0.1em;text-transform:uppercase;}
  .btn{
    background:var(--s2);border:1px solid var(--brd2);border-radius:3px;
    color:var(--txd);font-family:var(--mono);font-size:0.58rem;letter-spacing:0.04em;
    padding:0.18rem 0.4rem;cursor:pointer;transition:all 0.1s;
  }
  .btn:hover{color:var(--tx);border-color:#383848;}
  .btn.active{color:var(--grn);border-color:var(--grn);}
  .btn.danger{color:var(--red);border-color:var(--red);}
  .btn.sm{font-size:0.5rem;padding:0.1rem 0.25rem;}
  select{
    background:var(--s2);border:1px solid var(--brd2);border-radius:2px;
    color:var(--txd);font-family:var(--mono);font-size:0.58rem;
    padding:0.1rem 0.2rem;outline:none;
  }

  /* ── Sliders ── */
  .ctl-grp{display:flex;align-items:center;gap:0.25rem;}
  .ctl-lbl{font-size:0.48rem;color:var(--txdd);letter-spacing:0.08em;text-transform:uppercase;min-width:2.2rem;}
  .ctl-val{font-size:0.52rem;color:var(--txd);min-width:2.5ch;text-align:right;}
  input[type=range]{
    -webkit-appearance:none;height:2px;background:var(--brd2);outline:none;width:64px;cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;width:10px;height:10px;border-radius:50%;
    background:var(--txdd);cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb:active{background:var(--acc);}

  /* ── XY mode indicator ring ── */
  #xy-mode-dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--acc);flex-shrink:0;
    transition:background 0.2s;
  }
  #xy-mode-dot.vibrato{background:var(--grn);}
  #xy-mode-dot.overdrive{background:var(--org);}

  /* ── Active voices badge ── */
  #voice-count{
    font-size:0.5rem;color:var(--txddd);
    min-width:3ch;text-align:center;
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- ── Top bar ── -->
  <div class="topbar">
    <div class="tb-grp">
      <div id="xy-mode-dot" title="XY mode indicator"></div>
      <span class="lbl">XY</span>
      <button class="btn sm active" id="btn-filter" onclick="setXYMode('filter',this)">filter</button>
      <button class="btn sm" id="btn-vibrato" onclick="setXYMode('vibrato',this)">vibrato</button>
      <button class="btn sm" id="btn-drive" onclick="setXYMode('overdrive',this)">drive</button>
    </div>
    <div class="tb-sep"></div>
    <div class="tb-grp">
      <span class="lbl">oct</span>
      <button class="btn sm" onclick="shiftOctave(-1)">−</button>
      <span id="oct-v" style="font-size:0.72rem;color:var(--txd);min-width:2.5ch;text-align:center">0</span>
      <button class="btn sm" onclick="shiftOctave(+1)">+</button>
    </div>
    <div class="tb-sep"></div>
    <div class="tb-grp">
      <span class="lbl">tuning</span>
      <select id="tuning-sel" onchange="changeTuning(this.value)">
        <option value="ji" selected>JI alpha</option>
        <option value="31">31-EDO</option>
        <option value="19">19-EDO</option>
        <option value="12">12-TET</option>
      </select>
    </div>
    <div class="tb-sep"></div>
    <div class="tb-grp">
      <button class="btn sm" onclick="toggleControls()" id="btn-ctl">controls ▾</button>
    </div>
    <div class="tb-sep"></div>
    <button class="btn sm danger" onclick="panicAll()">■ panic</button>
    <div class="tb-sep"></div>
    <button class="btn sm" onclick="testBeep()">beep</button>
    <div class="tb-sep"></div>
    <span id="voice-count">0 vx</span>
    <span id="ctx-state" style="font-size:0.48rem;color:var(--txddd);margin-left:0.3rem;">ctx:—</span>
  </div>

  <!-- ── Controls panel ── -->
  <div class="controls hidden" id="ctl-panel">
    <div class="ctl-grp">
      <span class="ctl-lbl">saw</span>
      <input type=range id="sl-saw" min=0 max=100 value=70 oninput="setOscLevel('saw',this.value)">
      <span class="ctl-val" id="vl-saw">70</span>
    </div>
    <div class="ctl-grp">
      <span class="ctl-lbl">tri</span>
      <input type=range id="sl-tri" min=0 max=100 value=0 oninput="setOscLevel('tri',this.value)">
      <span class="ctl-val" id="vl-tri">0</span>
    </div>
    <div class="ctl-grp">
      <span class="ctl-lbl">sin</span>
      <input type=range id="sl-sin" min=0 max=100 value=50 oninput="setOscLevel('sin',this.value)">
      <span class="ctl-val" id="vl-sin">50</span>
    </div>
    <div class="tb-sep"></div>
    <div class="ctl-grp">
      <span class="ctl-lbl">atk</span>
      <input type=range id="sl-atk" min=1 max=200 value=10 oninput="updateVal('atk',this.value)">
      <span class="ctl-val" id="vl-atk">10ms</span>
    </div>
    <div class="ctl-grp">
      <span class="ctl-lbl">rel</span>
      <input type=range id="sl-rel" min=20 max=3000 value=300 oninput="updateVal('rel',this.value)">
      <span class="ctl-val" id="vl-rel">300ms</span>
    </div>
    <div class="tb-sep"></div>
    <div class="ctl-grp">
      <span class="ctl-lbl">LPF</span>
      <input type=range id="sl-lpf" min=0 max=100 value=50 oninput="updateVal('lpf',this.value)">
      <span class="ctl-val" id="vl-lpf">50</span>
    </div>
    <div class="ctl-grp">
      <span class="ctl-lbl">drive</span>
      <input type=range id="sl-drive" min=0 max=100 value=15 oninput="updateVal('drive',this.value)">
      <span class="ctl-val" id="vl-drive">15</span>
    </div>
    <div class="ctl-grp">
      <span class="ctl-lbl">vol</span>
      <input type=range id="sl-vol" min=0 max=100 value=75 oninput="setMasterVol(this.value)">
      <span class="ctl-val" id="vl-vol">75</span>
    </div>
  </div>

  <!-- ── Keyboard ── -->
  <div class="keyboard-wrap" id="kb-wrap">
    <canvas id="kb-canvas"></canvas>
  </div>

  <div class="hint-bar">
    drag after touch: XY modulation &nbsp;·&nbsp; slide between keys: legato &nbsp;·&nbsp; panic clears all voices
  </div>
</div>

<script>
(function(){
'use strict';

// ═══════════════════════════════════════════════════════════
// TUNINGS
// ═══════════════════════════════════════════════════════════

const ROOT_C3 = 130.81;

const JI_KEYS = [
  {key:'c',       label:'C',       ratio:1/1,       type:'nat'},
  {key:'cqs',     label:'C↑',      ratio:33/32,     type:'qt'},
  {key:'cs',      label:'C♯',      ratio:17/16,     type:'acc'},
  {key:'dqfl',    label:'D♭↑',     ratio:12/11,     type:'qt'},
  {key:'d',       label:'D',       ratio:9/8,       type:'nat'},
  {key:'dqs',     label:'D↑',      ratio:11/10,     type:'qt'},
  {key:'eflqfl',  label:'E♭¹³',    ratio:13/11,     type:'qt'},
  {key:'efl',     label:'E♭',      ratio:6/5,       type:'acc'},
  {key:'eqfl',    label:'E♭↑',     ratio:11/9,      type:'qt'},
  {key:'e',       label:'E',       ratio:5/4,       type:'nat'},
  {key:'eqs',     label:'E↑⁹⁷',    ratio:9/7,       type:'qt'},
  {key:'f',       label:'F',       ratio:4/3,       type:'nat'},
  {key:'fqs',     label:'F↑¹¹',    ratio:11/8,      type:'qt'},
  {key:'fsh',     label:'F♯',      ratio:45/32,     type:'acc'},
  {key:'fshqs',   label:'F♯↑',     ratio:23/16,     type:'qt'},
  {key:'g',       label:'G',       ratio:3/2,       type:'nat'},
  {key:'gqs',     label:'G↑¹⁴',    ratio:14/9,      type:'qt'},
  {key:'gsh',     label:'G♯¹¹',    ratio:11/7,      type:'qt'},
  {key:'atri',    label:'A♭¹³',    ratio:13/8,      type:'qt'},
  {key:'a',       label:'A',       ratio:5/3,       type:'nat'},
  {key:'bflsept', label:'B♭⁷',     ratio:7/4,       type:'qt'},
  {key:'bfl',     label:'B♭',      ratio:9/5,       type:'acc'},
  {key:'bflqs',   label:'B♭↑',     ratio:11/6,      type:'qt'},
  {key:'b',       label:'B',       ratio:15/8,      type:'nat'},
  {key:'bqs',     label:'B↑',      ratio:243/128,   type:'qt'},
];

function edoKeys(n) {
  return Array.from({length:n}, (_,i) => ({
    key: `p${i}`,
    label: i === 0 ? 'C' : (i % Math.round(n/7) === 0 ? `${i}/${n}` : ''),
    ratio: Math.pow(2, i/n),
    type: i === 0 ? 'nat' : (i % Math.round(n/12) === 0 ? 'acc' : 'qt'),
  }));
}

const TUNING_DATA = {
  ji:   {keys: JI_KEYS,      root: ROOT_C3, octaves: 3},
  '31': {keys: edoKeys(31),  root: ROOT_C3, octaves: 3},
  '19': {keys: edoKeys(19),  root: ROOT_C3, octaves: 3},
  '12': {keys: edoKeys(12),  root: ROOT_C3, octaves: 3},
};

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════

let actx = null, masterGain = null;
let currentTuning = 'ji', octaveShift = 0, xyMode = 'filter';

const params = {
  saw: 0.70, tri: 0.00, sin: 0.50,
  atk: 0.010, rel: 0.300, lpf: 0.50, drive: 0.15, vol: 0.75,
};

const voices     = new Map();  // pointerId → voice
const touchVoices = new Map(); // touch.identifier → voice
let pointerEventsWorking = false;

// ═══════════════════════════════════════════════════════════
// AUDIO CONTEXT
// ═══════════════════════════════════════════════════════════

function updateCtxDisplay() {
  const el = document.getElementById('ctx-state');
  if (!el) return;
  const s = actx ? actx.state : 'null';
  el.textContent = 'ctx:' + s;
  el.style.color = s === 'running'   ? 'var(--grn)'
                 : s === 'suspended' ? 'var(--org)'
                 : 'var(--txddd)';
}

function ensureCtx() {
  if (!actx) {
    actx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = actx.createGain();
    masterGain.gain.value = params.vol;
    masterGain.connect(actx.destination);
    actx.onstatechange = updateCtxDisplay;
  }
  updateCtxDisplay();
  if (actx.state !== 'running') {
    actx.resume().then(updateCtxDisplay).catch(() => {});
    // iOS belt-and-suspenders: play a silent 1-sample buffer to force unlock
    try {
      const buf = actx.createBuffer(1, 1, actx.sampleRate);
      const src = actx.createBufferSource();
      src.buffer = buf;
      src.connect(actx.destination);
      src.start(0);
    } catch(_) {}
  }
}

// Test tone: bypasses the entire voice chain (masterGain, shaper, filters, etc.)
// and connects a plain sine directly to actx.destination.
// If this works but keys don't → signal chain bug.
// If this is also silent → AudioContext itself can't output on this device.
function testBeep() {
  ensureCtx();
  if (!actx) return;
  try {
    const osc = actx.createOscillator();
    const g   = actx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 440;
    g.gain.setValueAtTime(0, actx.currentTime);
    g.gain.linearRampToValueAtTime(0.4, actx.currentTime + 0.02);
    g.gain.linearRampToValueAtTime(0, actx.currentTime + 0.6);
    osc.connect(g);
    g.connect(actx.destination);  // intentionally bypasses masterGain
    osc.start();
    osc.stop(actx.currentTime + 0.7);
  } catch(e) { console.error('testBeep:', e); }
}

// ═══════════════════════════════════════════════════════════
// TANH WAVESHAPER
// ═══════════════════════════════════════════════════════════

function makeTanhCurve(drive, n=512) {
  const curve = new Float32Array(n);
  const d = Math.max(drive, 0.001);
  const norm = Math.tanh(d);
  for (let i = 0; i < n; i++) {
    const x = (i * 2 / (n - 1)) - 1;
    curve[i] = Math.tanh(x * d) / norm;
  }
  return curve;
}

function lpfParamToHz(p) {
  return 80 * Math.pow(20000/80, Math.max(p, 0.001));
}

// ═══════════════════════════════════════════════════════════
// VOICE MANAGEMENT
// ═══════════════════════════════════════════════════════════

function makeVoice(freq, pointerId, lx0, ly0) {
  ensureCtx();

  const sawOsc = actx.createOscillator(); sawOsc.type = 'sawtooth'; sawOsc.frequency.value = freq;
  const triOsc = actx.createOscillator(); triOsc.type = 'triangle'; triOsc.frequency.value = freq;
  const sinOsc = actx.createOscillator(); sinOsc.type = 'sine';     sinOsc.frequency.value = freq;

  const sawG = actx.createGain(); sawG.gain.value = params.saw;
  const triG = actx.createGain(); triG.gain.value = params.tri;
  const sinG = actx.createGain(); sinG.gain.value = params.sin;
  const mixG = actx.createGain(); mixG.gain.value = 1.0;

  const adsrG = actx.createGain();
  adsrG.gain.setValueAtTime(0, actx.currentTime);
  const now = actx.currentTime;
  adsrG.gain.linearRampToValueAtTime(0.8, now + params.atk);
  adsrG.gain.linearRampToValueAtTime(0.65, now + params.atk + 0.05);

  const lfoOsc = actx.createOscillator(); lfoOsc.type = 'sine'; lfoOsc.frequency.value = 5;
  const lfoG = actx.createGain(); lfoG.gain.value = 0;
  lfoOsc.connect(lfoG);
  lfoG.connect(sawOsc.frequency);
  lfoG.connect(triOsc.frequency);
  lfoG.connect(sinOsc.frequency);

  const drive = 1 + params.drive * 11;
  const makeupGain = 1 + params.drive * 2.8;
  const shaper = actx.createWaveShaper();
  shaper.curve = makeTanhCurve(drive);
  shaper.oversample = '2x';
  const shaperPost = actx.createGain(); shaperPost.gain.value = makeupGain;

  const lpf = actx.createBiquadFilter(); lpf.type = 'lowpass';
  lpf.frequency.value = lpfParamToHz(params.lpf); lpf.Q.value = 2.0;
  const hpf = actx.createBiquadFilter(); hpf.type = 'highpass'; hpf.frequency.value = 30;
  // StereoPannerNode: try-catch for iOS < 14.5 compatibility
  let panner;
  try {
    panner = actx.createStereoPanner();
    panner.pan.value = 0;
  } catch(_) {
    panner = actx.createGain();          // passthrough — no pan on older iOS
    panner.pan = { setTargetAtTime: () => {}, value: 0 };
  }
  const voiceAmp = actx.createGain(); voiceAmp.gain.value = 0.25;

  sawOsc.connect(sawG); triOsc.connect(triG); sinOsc.connect(sinG);
  sawG.connect(mixG); triG.connect(mixG); sinG.connect(mixG);
  mixG.connect(adsrG); adsrG.connect(shaper);
  shaper.connect(shaperPost); shaperPost.connect(lpf);
  lpf.connect(hpf); hpf.connect(panner); panner.connect(voiceAmp);
  voiceAmp.connect(masterGain);

  sawOsc.start(); triOsc.start(); sinOsc.start(); lfoOsc.start();

  const voice = {
    freq, pointerId, lx0, ly0, rect: null,
    oscs: [sawOsc, triOsc, sinOsc], lfoOsc, lfoG,
    sawG, triG, sinG, mixG, adsrG, shaper, shaperPost, lpf, hpf, panner, voiceAmp,
    released: false,
    baseDrive: drive, baseLP: lpf.frequency.value, baseMakeup: makeupGain,
  };
  voices.set(pointerId, voice);

  // iOS AudioContext unlock is async: resume() is called in ensureCtx() but the
  // context may still be suspended when oscillators start. The ADSR attack ramps
  // are scheduled at frozen actx.currentTime=0. If the user releases before the
  // context resumes, releaseVoice() cancels those ramps (at still-frozen t=0),
  // so when the context finally starts, the voice is already in release → silence.
  //
  // Fix: listen for statechange and reschedule the attack from the actual moment
  // the context starts running. The voice.released check handles the case where
  // the user lifted their finger before the context woke up.
  if (actx.state !== 'running') {
    const onReady = () => {
      if (actx.state !== 'running') return;
      actx.removeEventListener('statechange', onReady);
      if (!voice.released) {
        const now = actx.currentTime;
        voice.adsrG.gain.cancelScheduledValues(now);
        voice.adsrG.gain.setValueAtTime(0, now);
        voice.adsrG.gain.linearRampToValueAtTime(0.8, now + params.atk);
        voice.adsrG.gain.linearRampToValueAtTime(0.65, now + params.atk + 0.05);
      }
    };
    actx.addEventListener('statechange', onReady);
  }

  updateVoiceCount();
  return voice;
}

function updateVoiceXY(voice, lx, ly) {
  if (voice.released || !voice.rect) return;
  const r = voice.rect;
  const dx = (lx - voice.lx0) / r.w;
  const dy = (voice.ly0 - ly) / r.h;

  const xyMod   = Math.min(Math.sqrt(dx*dx + dy*dy), 1.0);
  const xyAngle = (Math.atan2(dy, dx) / Math.PI) * 0.5 + 0.5;

  r.modAmt = xyMod;

  const panShift = (xyAngle - 0.5) * 0.6;
  voice.panner.pan.setTargetAtTime(panShift, actx.currentTime, 0.02);

  if (xyMode === 'filter') {
    voice.lpf.frequency.setTargetAtTime(
      Math.min(voice.baseLP * (1 + xyMod * 2), 20000), actx.currentTime, 0.02);
  } else if (xyMode === 'vibrato') {
    voice.lfoOsc.frequency.setTargetAtTime(0.5 + xyAngle * 11.5, actx.currentTime, 0.02);
    voice.lfoG.gain.setTargetAtTime(xyMod * 0.06 * voice.freq, actx.currentTime, 0.02);
  } else if (xyMode === 'overdrive') {
    voice.shaper.curve = makeTanhCurve(voice.baseDrive + xyMod * 10);
    voice.shaperPost.gain.setTargetAtTime(voice.baseMakeup + xyMod * 1.5, actx.currentTime, 0.02);
  }
}

function releaseVoice(voice) {
  if (voice.released) return;
  voice.released = true;
  if (voice.rect) { voice.rect.active = false; voice.rect.modAmt = 0; }

  // If the context was never running, no audio was ever produced.
  // Skip the ADSR ramp (it would fire at frozen t=0 and be meaningless),
  // and just clean up the nodes directly.
  if (!actx || actx.state !== 'running') {
    setTimeout(() => stopAndDisconnectVoice(voice), 50);
    return;
  }

  const now = actx.currentTime;
  const rel = Math.max(params.rel, 0.02);
  voice.adsrG.gain.cancelScheduledValues(now);
  voice.adsrG.gain.setValueAtTime(Math.max(voice.adsrG.gain.value, 0.001), now);
  voice.adsrG.gain.linearRampToValueAtTime(0, now + rel);
  voice.lfoG.gain.cancelScheduledValues(now);
  voice.lfoG.gain.setValueAtTime(0, now);
  setTimeout(() => stopAndDisconnectVoice(voice), (rel + 0.15) * 1000);
}

function stopAndDisconnectVoice(voice) {
  voice.oscs.forEach(o => { try{o.stop();}catch(_){} try{o.disconnect();}catch(_){} });
  try{voice.lfoOsc.stop();}catch(_){} try{voice.lfoOsc.disconnect();}catch(_){}
  [voice.lfoG,voice.sawG,voice.triG,voice.sinG,voice.mixG,
   voice.adsrG,voice.shaper,voice.shaperPost,voice.lpf,
   voice.hpf,voice.panner,voice.voiceAmp].forEach(n=>{try{n.disconnect();}catch(_){}});
  voices.delete(voice.pointerId);
  updateVoiceCount();
}

function panicAll() {
  // Nuclear silence: stop all oscillators, then sever masterGain from destination
  // and recreate it — cuts any zombie connections that bypassed stopAndDisconnect
  [...voices.values()].forEach(v => {
    v.released = true;
    v.oscs.forEach(o => { try { o.stop(); } catch(_) {} });
    try { v.lfoOsc.stop(); } catch(_) {}
  });
  voices.clear(); touchVoices.clear();

  if (actx && masterGain) {
    masterGain.gain.setValueAtTime(0, actx.currentTime);
    masterGain.disconnect();
    masterGain = actx.createGain();
    masterGain.gain.value = params.vol;
    masterGain.connect(actx.destination);
  }

  keyRects.forEach(r => { r.active = false; r.modAmt = 0; });
  drawKeyboard();
  updateVoiceCount();
}

// ═══════════════════════════════════════════════════════════
// CANVAS KEYBOARD — GEOMETRY
// ═══════════════════════════════════════════════════════════

const NAT_W = 48, ACC_W = 28, QT_W = 18;
const OCT_W = NAT_W * 7;  // 336px per octave

let kbCanvas, kbCtx, kbDpr = 1;
let keyRects = [];

function centsOf(r) { return 1200 * Math.log2(r); }

function buildKeyRects(logicalH) {
  const tun = TUNING_DATA[currentTuning];
  const octMult = Math.pow(2, octaveShift);
  const rects = [];

  for (let oct = 0; oct < tun.octaves; oct++) {
    const sorted = tun.keys
      .map((pk, i) => ({...pk, cents: centsOf(pk.ratio), origIdx: i}))
      .sort((a, b) => a.cents - b.cents);

    // Natural keys get sequential edge-to-edge positions (like a piano).
    // Accidentals and QTs get cents-based positions overlaid on top.
    const natKeys = sorted.filter(pk => pk.type === 'nat');

    sorted.forEach(pk => {
      const freq = tun.root * pk.ratio * Math.pow(2, oct) * octMult;
      let x, w, h;

      if (pk.type === 'nat') {
        const ni = natKeys.indexOf(pk);
        x = oct * OCT_W + ni * NAT_W;
        w = NAT_W; h = logicalH;
      } else {
        const xc = oct * OCT_W + (pk.cents / 1200) * OCT_W;
        w = pk.type === 'acc' ? ACC_W : QT_W;
        h = pk.type === 'acc' ? Math.round(logicalH * 0.60)
                               : Math.round(logicalH * 0.76);
        x = Math.round(xc - w / 2);
      }

      rects.push({
        x, y: 0, w, h,
        type: pk.type, label: pk.label, ratio: pk.ratio,
        freq, cents: pk.cents, oct,
        octStart: pk.origIdx === 0,
        active: false, modAmt: 0,
      });
    });
  }
  return rects;
}

function initCanvas() {
  kbCanvas = document.getElementById('kb-canvas');
  const wrap = document.getElementById('kb-wrap');
  kbDpr = window.devicePixelRatio || 1;

  const tun = TUNING_DATA[currentTuning];
  const logicalW = tun.octaves * OCT_W;

  // Compute keyboard height. On some iPadOS versions wrap.clientHeight returns
  // 0 in the initial rAF because flex layout isn't settled yet.
  // Fall back to window.innerHeight minus measured sibling heights.
  const topbarH   = (document.querySelector('.topbar')  || {}).offsetHeight || 44;
  const hintBarH  = (document.querySelector('.hint-bar') || {}).offsetHeight || 22;
  const ctlPanel  = document.getElementById('ctl-panel');
  const ctlH      = ctlPanel && !ctlPanel.classList.contains('hidden')
                    ? (ctlPanel.offsetHeight || 0) : 0;
  const fromWindow = window.innerHeight - topbarH - hintBarH - ctlH;
  const logicalH = Math.max(wrap.clientHeight || 0, fromWindow, 180);

  kbCanvas.style.width  = logicalW + 'px';
  kbCanvas.style.height = logicalH + 'px';
  kbCanvas.width  = Math.round(logicalW * kbDpr);
  kbCanvas.height = Math.round(logicalH * kbDpr);

  kbCtx = kbCanvas.getContext('2d');
  kbCtx.scale(kbDpr, kbDpr);  // safe: canvas.width= reset all ctx state

  keyRects = buildKeyRects(logicalH);
  drawKeyboard();
  requestAnimationFrame(() => { wrap.scrollLeft = OCT_W; });
}

// ─── Drawing ────────────────────────────────────────────────

const KC = {
  nat: { bg: ['#252838','#1e2030'], brd: '#0d0e18', act: ['#2a5cb8','#1a3c7a'] },
  acc: { bg: ['#0f1020','#0a0b16'], brd: '#06070f', act: ['#1e4898','#122c60'] },
  qt:  { bg: ['#1e1a0c','#161208'], brd: '#0a0800', act: ['#6a4010','#3a2008'] },
};

function drawKeyboard() {
  if (!kbCtx) return;
  kbCtx.clearRect(0, 0, kbCanvas.width / kbDpr, kbCanvas.height / kbDpr);
  for (const layer of ['nat', 'qt', 'acc']) {
    keyRects.filter(r => r.type === layer).forEach(drawKey);
  }
}

function drawKey(r) {
  const {x, y, w, h, type, active, modAmt, label, ratio, octStart, oct} = r;
  const c = kbCtx, col = KC[type];

  // Body gradient
  const [t0, t1] = active ? col.act : col.bg;
  const gr = c.createLinearGradient(x, y, x, y + h);
  gr.addColorStop(0, t0); gr.addColorStop(1, t1);
  c.fillStyle = gr;

  // Shape with rounded bottom
  const rad = type === 'nat' ? 4 : 2;
  c.beginPath();
  c.moveTo(x + 0.5, y);
  c.lineTo(x + w - 0.5, y);
  c.lineTo(x + w - 0.5, y + h - rad);
  c.arcTo(x + w - 0.5, y + h, x + w - 0.5 - rad, y + h, rad);
  c.lineTo(x + 0.5 + rad, y + h);
  c.arcTo(x + 0.5, y + h, x + 0.5, y + h - rad, rad);
  c.lineTo(x + 0.5, y);
  c.fill();

  // Border — 1px right and bottom edge for all keys
  c.strokeStyle = type === 'nat' ? '#000008'
                : type === 'acc' ? '#000004'
                : '#080400';
  c.lineWidth = 1;
  c.stroke();

  // Octave-start left border
  if (octStart) {
    c.strokeStyle = '#5a5a88'; c.lineWidth = 2;
    c.beginPath(); c.moveTo(x + 1, y); c.lineTo(x + 1, y + h); c.stroke();
  }

  // Active glow
  if (active) {
    const gc = type === 'qt' ? 'rgba(212,168,67,' : 'rgba(74,158,255,';
    const gOv = c.createLinearGradient(x, y + h, x, y);
    gOv.addColorStop(0, gc + '0.35)'); gOv.addColorStop(1, gc + '0.0)');
    c.fillStyle = gOv; c.fillRect(x, y, w, h);
  }

  // XY mod fill
  if (modAmt > 0) {
    const mh = h * modAmt;
    const mc = type === 'qt' ? 'rgba(212,168,67,' : 'rgba(74,158,255,';
    const mGr = c.createLinearGradient(x, y + h, x, y + h - mh);
    mGr.addColorStop(0, mc + '0.5)'); mGr.addColorStop(1, mc + '0.05)');
    c.fillStyle = mGr; c.fillRect(x, y + h - mh, w, mh);
  }

  // Text
  c.textAlign = 'center';

  // Octave badge (C keys)
  if (octStart) {
    c.fillStyle = 'rgba(180,180,220,0.5)';
    c.font = '300 7px "JetBrains Mono",monospace';
    c.textBaseline = 'top';
    c.fillText(String(3 + oct), x + w / 2, y + 3);
  }

  // Pitch label
  const lblColor = active ? '#ffffff'
    : octStart ? '#c0c0e0'
    : type === 'nat' ? '#9898bc'
    : type === 'acc' ? '#585870'
    : '#c09848';
  c.fillStyle = lblColor;
  c.font = `500 ${type === 'nat' ? 9 : 7}px "JetBrains Mono",monospace`;
  c.textBaseline = 'top';
  const lblY = type === 'nat' ? (octStart ? 14 : 8)
             : type === 'acc' ? 6 : 9;
  c.fillText(label, x + w / 2, y + lblY);

  // Ratio (nat keys only, near bottom)
  if (type === 'nat' && currentTuning === 'ji') {
    c.fillStyle = active ? 'rgba(255,255,255,0.5)' : 'rgba(160,160,200,0.25)';
    c.font = '300 6px "JetBrains Mono",monospace';
    c.textBaseline = 'bottom';
    c.fillText(toFraction(ratio), x + w / 2, y + h - 4);
  }
}

// ─── Hit testing ────────────────────────────────────────────

function hitTest(lx, ly) {
  for (const layer of ['acc', 'qt', 'nat']) {
    const hits = keyRects.filter(r =>
      r.type === layer && lx >= r.x && lx < r.x + r.w && ly >= r.y && ly < r.y + r.h
    );
    if (hits.length) return hits[hits.length - 1];
  }
  return null;
}

function canvasXY(clientX, clientY) {
  // Use wrapper BCR + scrollLeft instead of canvas BCR — Safari on iPad
  // can return wrong values for getBoundingClientRect() on a child element
  // inside a horizontally-scrolled overflow container.
  const wrap = document.getElementById('kb-wrap');
  const bcr  = wrap.getBoundingClientRect();
  return {
    lx: clientX - bcr.left + wrap.scrollLeft,
    ly: clientY - bcr.top,
  };
}

// ═══════════════════════════════════════════════════════════
// CANVAS EVENT HANDLERS
// ═══════════════════════════════════════════════════════════

function onCanvasDown(e) {
  e.preventDefault();
  if (e.pointerType === 'touch') pointerEventsWorking = true;
  ensureCtx();
  const {lx, ly} = canvasXY(e.clientX, e.clientY);
  const rect = hitTest(lx, ly);
  if (!rect) return;
  try { kbCanvas.setPointerCapture(e.pointerId); } catch(_) {}
  // If this pointer already has a voice (e.g. Force Touch fires a second
  // pointerdown at deeper click depth), release the old voice cleanly first.
  const existing = voices.get(e.pointerId);
  if (existing) releaseVoice(existing);
  rect.active = true;
  try {
    const voice = makeVoice(rect.freq, e.pointerId, lx, ly);
    voice.rect = rect;
  } catch(err) {
    rect.active = false;  // rollback visual if synthesis failed
    console.error('makeVoice:', err);
  }
  drawKeyboard();
}

function onCanvasMove(e) {
  e.preventDefault();
  const voice = voices.get(e.pointerId);
  if (!voice || voice.released) return;
  const {lx, ly} = canvasXY(e.clientX, e.clientY);
  updateVoiceXY(voice, lx, ly);
  drawKeyboard();
}

function onCanvasUp(e) {
  e.preventDefault();
  const voice = voices.get(e.pointerId);
  if (!voice) return;
  releaseVoice(voice);
  drawKeyboard();
}

function onCanvasTouchStart(e) {
  // Always unlock audio on touchstart — iOS treats touchstart as a trusted
  // user gesture for Web Audio even when pointerdown is not.
  ensureCtx();
  if (pointerEventsWorking) return;
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (touchVoices.has(t.identifier)) continue;
    const {lx, ly} = canvasXY(t.clientX, t.clientY);
    const rect = hitTest(lx, ly);
    if (!rect) continue;
    rect.active = true;
    const fakeId = -(t.identifier + 1);
    const voice = makeVoice(rect.freq, fakeId, lx, ly);
    voice.rect = rect;
    touchVoices.set(t.identifier, voice);
  }
  drawKeyboard();
}

function onCanvasTouchMove(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const voice = touchVoices.get(t.identifier);
    if (!voice || voice.released) continue;
    const {lx, ly} = canvasXY(t.clientX, t.clientY);
    updateVoiceXY(voice, lx, ly);
  }
  drawKeyboard();
}

function onCanvasTouchEnd(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const voice = touchVoices.get(t.identifier);
    if (!voice) continue;
    releaseVoice(voice);
    touchVoices.delete(t.identifier);
  }
  drawKeyboard();
}

// ═══════════════════════════════════════════════════════════
// FRACTION LOOKUP
// ═══════════════════════════════════════════════════════════

function toFraction(ratio) {
  const known = {
    [1/1]:'1/1',[33/32]:'33/32',[17/16]:'17/16',[12/11]:'12/11',
    [9/8]:'9/8',[11/10]:'11/10',[13/11]:'13/11',[6/5]:'6/5',
    [11/9]:'11/9',[5/4]:'5/4',[9/7]:'9/7',[4/3]:'4/3',
    [11/8]:'11/8',[45/32]:'45/32',[23/16]:'23/16',[3/2]:'3/2',
    [14/9]:'14/9',[11/7]:'11/7',[13/8]:'13/8',[5/3]:'5/3',
    [7/4]:'7/4',[9/5]:'9/5',[11/6]:'11/6',[15/8]:'15/8',
    [243/128]:'243/128',
  };
  for (const [k, v] of Object.entries(known)) {
    if (Math.abs(parseFloat(k) - ratio) < 0.00001) return v;
  }
  return ratio.toFixed(4);
}

// ═══════════════════════════════════════════════════════════
// UI CONTROLS
// ═══════════════════════════════════════════════════════════

function setXYMode(mode, btn) {
  xyMode = mode;
  document.querySelectorAll('.topbar .btn.sm').forEach(b => {
    if (['btn-filter','btn-vibrato','btn-drive'].includes(b.id)) b.classList.remove('active');
  });
  btn.classList.add('active');
  const dot = document.getElementById('xy-mode-dot');
  dot.className = mode === 'vibrato' ? 'vibrato' : mode === 'overdrive' ? 'overdrive' : '';
}

function shiftOctave(delta) {
  octaveShift = Math.max(-2, Math.min(2, octaveShift + delta));
  document.getElementById('oct-v').textContent = (octaveShift >= 0 ? '+' : '') + octaveShift;
  panicAll();
  initCanvas();
}

function changeTuning(val) {
  panicAll();
  currentTuning = val;
  initCanvas();
}

function toggleControls() {
  const panel = document.getElementById('ctl-panel');
  const btn = document.getElementById('btn-ctl');
  panel.classList.toggle('hidden');
  btn.textContent = panel.classList.contains('hidden') ? 'controls ▾' : 'controls ▴';
  setTimeout(initCanvas, 50);  // resize canvas after reflow
}

function setOscLevel(osc, val) {
  const v = val / 100;
  params[osc] = v;
  document.getElementById('vl-' + osc).textContent = val;
  voices.forEach(voice => {
    const gn = osc === 'saw' ? voice.sawG : osc === 'tri' ? voice.triG : voice.sinG;
    gn.gain.setTargetAtTime(v, actx.currentTime, 0.01);
  });
}

function updateVal(param, val) {
  if (param === 'atk') {
    params.atk = val / 1000;
    document.getElementById('vl-atk').textContent = val + 'ms';
  } else if (param === 'rel') {
    params.rel = val / 1000;
    document.getElementById('vl-rel').textContent = val + 'ms';
  } else if (param === 'lpf') {
    params.lpf = val / 100;
    document.getElementById('vl-lpf').textContent = val;
    const hz = lpfParamToHz(params.lpf);
    voices.forEach(v => { if (!v.released) v.lpf.frequency.setTargetAtTime(hz, actx.currentTime, 0.02); });
  } else if (param === 'drive') {
    params.drive = val / 100;
    document.getElementById('vl-drive').textContent = val;
  }
}

function setMasterVol(val) {
  params.vol = val / 100;
  document.getElementById('vl-vol').textContent = val;
  if (masterGain) masterGain.gain.setTargetAtTime(params.vol, actx.currentTime, 0.02);
}

function updateVoiceCount() {
  const el = document.getElementById('voice-count');
  el.textContent = voices.size + ' vx';
  // Visual debug: turns blue when any voice is active — confirms touch
  // is registering even if audio is broken (e.g. AudioContext still suspended)
  el.style.color = voices.size > 0 ? 'var(--acc)' : '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') panicAll(); });

// Global safety net: catch pointer-up that misses the canvas (finger slides off topbar etc.)
function globalPointerUp(e) {
  const voice = voices.get(e.pointerId);
  if (voice) { releaseVoice(voice); drawKeyboard(); }
}
window.addEventListener('pointerup',     globalPointerUp, {passive:true});
window.addEventListener('pointercancel', globalPointerUp, {passive:true});

// Expose UI callbacks to global scope (onclick= attributes can't see inside IIFE)
Object.assign(window, {
  setXYMode, shiftOctave, changeTuning, toggleControls,
  setOscLevel, updateVal, setMasterVol, panicAll, testBeep,
});

// Audio unlock for any gesture on the page.
// touchstart at document level ensures the AudioContext is unlocked even if
// the user's first touch is on the topbar or controls — not just the canvas.
document.addEventListener('touchstart', () => ensureCtx(), {passive:true});
document.addEventListener('click',      () => ensureCtx(), {passive:true});
document.addEventListener('mousedown',  () => ensureCtx(), {passive:true});

// ── Init ── Double-rAF: first frame starts layout; second frame measures it.
// Needed on iPadOS Safari where 100vh + flex layout isn't settled in one frame.
requestAnimationFrame(() => requestAnimationFrame(() => {
  initCanvas();
  kbCanvas.addEventListener('pointerdown',   onCanvasDown,       {passive:false});
  kbCanvas.addEventListener('pointermove',   onCanvasMove,       {passive:false});
  kbCanvas.addEventListener('pointerup',     onCanvasUp,         {passive:false});
  kbCanvas.addEventListener('pointercancel', onCanvasUp,         {passive:false});
  // Prevent contextmenu (Force Touch / right-click) — blocks pointerup on macOS trackpad
  kbCanvas.addEventListener('contextmenu',   e => e.preventDefault());
  // Capture-phase touchstart: iOS trusted gesture for AudioContext.resume()
  kbCanvas.addEventListener('touchstart', () => ensureCtx(), {passive:true, capture:true});
  kbCanvas.addEventListener('touchstart',    onCanvasTouchStart, {passive:false});
  kbCanvas.addEventListener('touchmove',     onCanvasTouchMove,  {passive:false});
  kbCanvas.addEventListener('touchend',      onCanvasTouchEnd,   {passive:false});
  kbCanvas.addEventListener('touchcancel',   onCanvasTouchEnd,   {passive:false});
  // Re-init canvas on resize (orientation change, browser chrome show/hide)
  window.addEventListener('resize', () => { panicAll(); initCanvas(); });
}));

})();
</script>
</body>
