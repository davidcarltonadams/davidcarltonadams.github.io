<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>a notation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #060606;
      color: #d4ccC4;
      font-family: Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }

    #score-text {
      max-width: min(640px, 88vw);
      text-align: center;
      padding: 2rem;
      transition: opacity 0.5s ease;
    }

    .instruction {
      font-size: clamp(1.1rem, 3.5vw, 1.7rem);
      font-weight: normal;
      line-height: 1.55;
      letter-spacing: 0.02em;
      color: #d4ccc4;
    }

    #score-meta {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      color: rgba(212,204,196,0.12);
      font-style: italic;
      white-space: nowrap;
    }

    #random-btn {
      position: fixed;
      bottom: 1.6rem;
      right: 2rem;
      font-size: 1rem;
      color: rgba(212,204,196,0.13);
      background: none;
      border: none;
      cursor: pointer;
      font-family: Georgia, serif;
      padding: 0.4rem 0.6rem;
      transition: color 0.3s ease;
      line-height: 1;
    }
    #random-btn:hover { color: rgba(212,204,196,0.4); }

    .fade-out { opacity: 0; }
  </style>
</head>
<body>

<div id="score-text" aria-live="polite">
  <p class="instruction" id="instruction-el"></p>
</div>

<p id="score-meta">generated</p>
<button id="random-btn" title="generate another" aria-label="generate another notation">↻</button>

<script>
// ── Seeded PRNG (xorshift) ─────────────────────────────────────────────────
function makeRng(seed) {
  let s = (seed ^ 0xDEADBEEF) >>> 0 || 1;
  return function() {
    s ^= s << 13; s ^= s >> 17; s ^= s << 5;
    return (s >>> 0) / 0xFFFFFFFF;
  };
}

// ── Vocabulary pools ───────────────────────────────────────────────────────

    "Find the frequency the instrument almost plays.\nHelp it.",
    "Play the overtone series as a melody.\nBegin anywhere.",

// ── Helpers ────────────────────────────────────────────────────────────────
function pick(rng, arr) {
  return arr[Math.floor(rng() * arr.length)];
}

function pickDiff(rng, arr, avoid) {
  const filtered = arr.filter(x => x !== avoid);
  return filtered.length ? filtered[Math.floor(rng() * filtered.length)] : arr[0];
}

// ── Templates ──────────────────────────────────────────────────────────────
function tAttend(rng) {
  return pick(rng, P.attend_verb) + ' ' + pick(rng, P.attend_obj) + '.\n' + pick(rng, P.attend_then);
}
function tFind(rng) {
  return 'Find ' + pick(rng, P.find_obj) + '.\n' + pick(rng, P.find_then);
}
function tHold(rng) {
  return pick(rng, P.hold_verb) + ' ' + pick(rng, P.hold_obj) + ' ' + pick(rng, P.hold_until);
}
function tDo(rng) {
  return pick(rng, P.do_action) + '.\n' + pick(rng, P.consequence);
}
function tIsAlso(rng) {
  return pick(rng, P.subject) + ' ' + pick(rng, P.is_also);
}
function tPlayThen(rng) {
  return pick(rng, P.play_cond) + '.\nThen: ' + pick(rng, P.play_then);
}
function tDoNot(rng) {
  return pick(rng, P.do_not) + '\n' + pick(rng, P.do_anyway);
}
function tOracular(rng) {
  return pick(rng, P.oracular);
}
function tMicro(rng) {
  return pick(rng, P.micro);
}
function tEquation(rng) {
  const a = pick(rng, P.eq_a);
  const b = pickDiff(rng, P.eq_b, a.toLowerCase());
  return a + ' = ' + b + '.';
}
function tEquation3(rng) {
  const a = pick(rng, P.eq_a);
  const b = pickDiff(rng, P.eq_b, a.toLowerCase());
  const c = pickDiff(rng, P.eq_b, b);
  return a + ' = ' + b + ' = ' + c + '.';
}

const TEMPLATES = [
  { w: 18, fn: tAttend },
  { w: 12, fn: tFind },
  { w: 10, fn: tHold },
  { w: 10, fn: tDo },
  { w:  8, fn: tIsAlso },
  { w:  8, fn: tPlayThen },
  { w:  8, fn: tDoNot },
  { w: 12, fn: tOracular },
  { w:  8, fn: tMicro },
  { w:  3, fn: tEquation },
  { w:  3, fn: tEquation3 },
];
const TOTAL_W = TEMPLATES.reduce((s, t) => s + t.w, 0);

function generate(seed) {
  const rng = makeRng(seed);
  // pick weighted template
  let r = rng() * TOTAL_W;
  let fn = TEMPLATES[TEMPLATES.length - 1].fn;
  for (const t of TEMPLATES) {
    r -= t.w;
    if (r <= 0) { fn = t.fn; break; }
  }
  return fn(rng);
}

// ── Display ────────────────────────────────────────────────────────────────
const textEl  = document.getElementById('score-text');
const instrEl = document.getElementById('instruction-el');
const btn     = document.getElementById('random-btn');

let currentSeed = null;

function fmt(raw) { return raw.split('\n').join('<br>'); }

function show(seed, animate) {
  currentSeed = seed;
  const text = generate(seed);
  history.replaceState(null, '', '?s=' + seed);
  if (animate) {
    textEl.classList.add('fade-out');
    setTimeout(() => {
      instrEl.innerHTML = fmt(text);
      textEl.classList.remove('fade-out');
    }, 500);
  } else {
    instrEl.innerHTML = fmt(text);
  }
}

function next() {
  show(Math.floor(Math.random() * 0xFFFFFF), true);
}

// ── Interactions ───────────────────────────────────────────────────────────
document.addEventListener('click', e => { if (e.target !== btn) next(); });
document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'ArrowRight' || e.key === 'Enter') {
    e.preventDefault(); next();
  }
});
btn.addEventListener('click', e => { e.stopPropagation(); next(); });

// ── Init ───────────────────────────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const s = params.get('s');
show(s ? (parseInt(s, 10) || Math.floor(Math.random() * 0xFFFFFF))
       : Math.floor(Math.random() * 0xFFFFFF),
     false);
</script>
</body>
</html>
